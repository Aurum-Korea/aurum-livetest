<!doctype html>
<html lang="en" class="lang-en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<title>Advisor Login · The Aurum Century Club</title>
<meta name="description" content="GP Advisor portal login.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--card:#0f0d0a;--card-2:#131210;
  --text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;
  --gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;
  --goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);
  --goldWash:rgba(197,165,114,0.04);--goldWashS:rgba(197,165,114,0.10);
  --goldGlow:rgba(197,165,114,0.20);--border:rgba(255,255,255,0.08);--red:#c77061;
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --sans:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:rgba(197,165,114,0.30)}

.amb{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 1100px 700px at 50% 0%,rgba(197,165,114,0.07),transparent 65%)}

.nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:16px clamp(20px,5.5vw,88px);background:linear-gradient(180deg,rgba(10,10,10,0.85),rgba(10,10,10,0));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;justify-content:space-between;align-items:center}
.lockup{display:flex;align-items:center;gap:14px}
.seal{width:34px;height:34px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:16px;letter-spacing:-0.04em;flex-shrink:0;transition:box-shadow .3s,border-color .3s}
.lockup:hover .seal{box-shadow:0 0 18px var(--goldGlow);border-color:var(--goldB)}
.lockup-text{display:flex;flex-direction:column;line-height:1}
.lockup-text .word{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:0.34em;color:var(--text)}
.lockup-text .sub{font-family:var(--mono);font-weight:400;font-size:8.5px;letter-spacing:0.36em;color:var(--goldD);margin-top:5px}

.page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14vh clamp(20px,5.5vw,88px) 64px}
.card{width:100%;max-width:460px;text-align:center}

.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.34em;color:var(--gold);margin-bottom:14px;text-transform:uppercase}
.title{font-family:var(--serif);font-style:italic;font-size:clamp(34px,5vw,48px);line-height:1.1;letter-spacing:-0.015em;color:var(--text);margin:0 0 10px}
.lede{font-family:var(--sans);font-weight:300;font-size:14px;line-height:1.7;color:var(--sub);margin:0 0 36px}

.form-body{display:flex;flex-direction:column;gap:0;text-align:left}

.field{display:flex;flex-direction:column;gap:0;margin-bottom:22px}
.field-label{font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldD);text-transform:uppercase;margin-bottom:8px}
.field-input{width:100%;padding:14px 0;background:transparent;border:0;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--sans);font-weight:300;font-size:16px;outline:none;transition:border-color .3s,box-shadow .3s;-webkit-appearance:none}
.field-input::placeholder{color:var(--muted);font-style:italic;font-family:var(--serif)}
.field-input:hover{border-bottom-color:var(--goldBorder)}
.field-input:focus{border-bottom-color:var(--gold);box-shadow:0 1px 0 0 var(--gold)}
.field-input.error{border-bottom-color:var(--red)}

.submit-btn{display:inline-flex;align-items:center;justify-content:center;gap:12px;padding:18px 32px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:0.30em;text-transform:uppercase;border:1px solid var(--gold);background:var(--gold);color:var(--bg);cursor:pointer;transition:all .3s;width:100%;margin-top:8px;position:relative;overflow:hidden}
.submit-btn:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB);transform:translateY(-1px);box-shadow:0 8px 28px rgba(227,193,135,0.25)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.submit-btn .arrow{font-family:var(--serif);font-style:italic;font-size:18px;letter-spacing:0;transition:transform .3s var(--ease-out)}
.submit-btn:hover:not(:disabled) .arrow{transform:translateX(5px)}
@keyframes spin{to{transform:rotate(360deg)}}
.submit-btn.loading .label,.submit-btn.loading .arrow{opacity:0}
.submit-btn.loading::after{content:'';position:absolute;top:50%;left:50%;width:18px;height:18px;margin:-9px 0 0 -9px;border:2px solid var(--bg);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}

.err{margin-top:14px;font-family:var(--serif);font-style:italic;color:var(--red);font-size:13px;min-height:1.2em;text-align:center}

.foot{margin-top:40px;font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--muted);text-align:center}
.foot a{color:var(--goldD);transition:color .2s}
.foot a:hover{color:var(--goldB)}

.divider{display:flex;align-items:center;gap:14px;margin:28px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-family:var(--mono);font-size:8.5px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;flex-shrink:0}
</style>
</head>
<body>
<div class="amb"></div>

<nav class="nav">
  <a class="lockup" href="/">
    <span class="seal"><em>Au</em></span>
    <div class="lockup-text">
      <span class="word">AURUM</span>
      <span class="sub">GP ADVISOR PORTAL</span>
    </div>
  </a>
</nav>

<main class="page">
  <div class="card">
    <div class="eyebrow">Advisor Access</div>
    <h1 class="title">Sign <em>in.</em></h1>
    <p class="lede">Use the credentials issued to your firm by TACC.</p>

    <form id="form" autocomplete="off">
      <div class="form-body">
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="field-input" autocomplete="username" placeholder="you@yourfirm.com" required>
        </div>
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="field-input" autocomplete="current-password" placeholder="··········" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        <span class="label">SIGN IN</span>
        <span class="arrow">→</span>
      </button>
      <div class="err" id="err"></div>
    </form>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">Access</div><div class="divider-line"></div></div>

    <div class="foot">
      CREDENTIALS ISSUED BY TACC ONLY &nbsp;·&nbsp; <a href="mailto:info@theaurumcc.com">CONTACT PARTNERS →</a>
    </div>
  </div>
</main>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('err');
  const emailEl = document.getElementById('email');
  const pwEl = document.getElementById('password');

  errEl.textContent = '';
  emailEl.classList.remove('error');
  pwEl.classList.remove('error');

  const email = emailEl.value.trim().toLowerCase();
  const password = pwEl.value;
  if (!email || !password) return;

  btn.disabled = true; btn.classList.add('loading');
  try {
    const r = await fetch('/api/advisor/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'same-origin',
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok) {
      const next = new URLSearchParams(location.search).get('next') || '/advisor';
      location.href = next;
      return;
    }
    const msg = j.error || 'Credentials not recognised.';
    errEl.textContent = msg;
    emailEl.classList.add('error');
    pwEl.classList.add('error');
  } catch {
    errEl.textContent = 'Connection error. Please try again.';
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
});

// If already authed, skip straight to portal
(async () => {
  try {
    const r = await fetch('/api/advisor/me', { credentials: 'same-origin', cache: 'no-store' });
    if (r.ok) { location.replace('/advisor'); }
  } catch {}
})();
</script>
</body>
</html>
