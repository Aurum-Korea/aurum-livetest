<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In · Aurum Century Club</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#0f0d0a;
  --text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;--border:rgba(197,165,114,0.18);
  --gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;
  --goldBd:rgba(197,165,114,0.28);--goldW:rgba(197,165,114,0.06);
  --red:#c0392b;--green:#5a9e7a;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:340px;padding:40px 24px}
.seal{width:56px;height:56px;border:1px solid var(--goldBd);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;font-size:24px;color:var(--gold);margin:0 auto 22px}
.title{font-family:var(--serif);font-style:italic;font-size:30px;color:var(--text);text-align:center;margin-bottom:4px}
.sub{font-family:var(--mono);font-size:7.5px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:32px}
.field{margin-bottom:12px}
.field label{display:block;font-size:7px;letter-spacing:.26em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 12px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--goldBd)}
.err{font-size:8.5px;color:var(--red);min-height:16px;margin-bottom:10px;text-align:center}
.btn{width:100%;background:var(--gold);color:var(--bg);font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;padding:13px;border:0;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:default}
.footer{margin-top:24px;font-size:7px;letter-spacing:.14em;color:var(--muted);text-align:center;line-height:1.8}
@media(max-width:400px){.wrap{padding:32px 16px}.title{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="seal"><em>Au</em></div>
  <div class="title">Aurum Century Club</div>
  <div class="sub">Secure Sign In</div>

  <div class="field">
    <label>Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@domain.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="btn" onclick="signIn()">SIGN IN →</button>

  <div class="footer">
    AURUM CENTURY CLUB · PRIVATE ACCESS<br>
    Authorised personnel only
  </div>
</div>

<script>
var emailEl    = document.getElementById('email');
var passwordEl = document.getElementById('password');
var errEl      = document.getElementById('err');
var btn        = document.getElementById('btn');

// Pre-fill from ?e= param (magic link helper)
var qp = new URLSearchParams(location.search);
if (qp.get('e')) emailEl.value = decodeURIComponent(qp.get('e'));

// Enter key
passwordEl.addEventListener('keydown', function(e){ if(e.key==='Enter') signIn(); });
emailEl.addEventListener('keydown', function(e){ if(e.key==='Enter') passwordEl.focus(); });



function getNext(def) {
  var n = qp.get('next') || def;
  return /^\/[^/]/.test(n) ? n : def;
}

async function signIn() {
  var email    = (emailEl.value || '').trim();
  var password = passwordEl.value || '';
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email and password required'; return; }
  btn.disabled = true; btn.textContent = 'SIGNING IN…';

  try {
    // 1. Try partner / admin login
    var r = await fetch('/api/login', {
      method: 'POST', credentials: 'same-origin',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: email, password: password })
    });
    var j = await r.json().catch(function(){ return {}; });
    if (r.ok && j.ok) {
      window.location.replace(getNext('/admin'));
      return;
    }

    // 2. Try advisor login
    var r2 = await fetch('/api/advisor/login', {
      method: 'POST', credentials: 'same-origin',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: email, password: password })
    });
    var j2 = await r2.json().catch(function(){ return {}; });
    if (r2.ok && j2.ok) {
      window.location.replace('/advisor');
      return;
    }

    // Both failed
    errEl.textContent = (j && j.error) || 'Incorrect email or password';
  } catch(e) {
    errEl.textContent = 'Network error — try again';
  }

  btn.disabled = false; btn.textContent = 'SIGN IN →';
}
</script>
</body>
</html>
