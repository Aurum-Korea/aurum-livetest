<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 56" width="180" height="56">
  <defs>
    <linearGradient id="pathLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3020" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C5A572"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3C187"/>
      <stop offset="100%" stop-color="#9a7a48"/>
    </linearGradient>
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3C187"/>
      <stop offset="60%" stop-color="#C5A572"/>
      <stop offset="100%" stop-color="#a08050"/>
    </linearGradient>
  </defs>

  <!-- Path mark: line → diamond -->
  <line x1="0" y1="10" x2="26" y2="10" stroke="url(#pathLine)" stroke-width="1.2"/>
  <!-- Diamond at end of path -->
  <path d="M30 6 L34 10 L30 14 L26 10 Z" fill="url(#diamondGrad)"/>
  <!-- Subtle glow line under mark -->
  <line x1="0" y1="11.5" x2="34" y2="11.5" stroke="rgba(197,165,114,0.12)" stroke-width="1"/>

  <!-- GoldPath — primary text, serif italic -->
  <text x="0" y="34"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-style="italic"
    font-weight="400"
    font-size="26"
    letter-spacing="0.02em"
    fill="url(#textGold)">GoldPath</text>

  <!-- 금환 — secondary Korean text, mono, dimmer -->
  <text x="2" y="50"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-weight="400"
    font-size="10"
    letter-spacing="0.22em"
    fill="#7a6d58"
    opacity="0.85">금환</text>

  <!-- Thin rule between primary and secondary text -->
  <line x1="0" y1="37.5" x2="148" y2="37.5" stroke="rgba(197,165,114,0.14)" stroke-width="0.5"/>
</svg>
