// ── actions ──────────────────────────────────────────────────────────────
async function updateStatus(status) {
  if (!state.selected) return;
  const old = state.selected.status;
  if (old === status) return;
  try {
    const j = await api('POST', '/api/admin/update', { id: state.selected.id, status });
    state.selected = j.lead;
    upsertLead(j.lead);
    renderStats(); renderFilters(); renderList(); renderDetail();
    toast('STATUS · ' + STATUS_LBL[status], 'ok');
  } catch (e) { toast('UPDATE FAILED · ' + e.message, 'err'); }
}

async function addNote() {
  const ta = $('note-input');
  const text = (ta.value || '').trim();
  if (!text) return;
  const btn = $('note-save');
  btn.disabled = true; btn.textContent = '…';
  try {
    const j = await api('POST', '/api/admin/update', { id: state.selected.id, note: text });
    state.selected = j.lead;
    upsertLead(j.lead);
    renderDetail();
    toast('NOTE ADDED', 'ok');
  } catch (e) {
    toast('FAILED · ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '+ ADD NOTE';
  }
}

async function doAction(action, btn) {
  const l = state.selected;
  if (!l) return;
  if (action === 'approve' || action === 'approve-no-email' || action === 'resend') {
    const sendEmail = action !== 'approve-no-email';
    const verb = action === 'resend' ? 'Resend the invitation email?' : (sendEmail ? 'Approve and email the invitation now?' : 'Generate a code without emailing?');
    if (!confirm(verb)) return;
    try {
      const j = await api('POST', '/api/admin/approve', { id: l.id, send_email: sendEmail });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderStats(); renderFilters(); renderList(); renderDetail();
      if (j.email && j.email.sent) toast('SENT · ' + j.code, 'ok');
      else if (sendEmail) toast('CODE READY · email not sent (' + (j.email?.reason||'?') + ')', 'err');
      else toast('CODE · ' + j.code, 'ok');
      // Show preview
      window._lastPreview = j.preview;
      window._lastCode = j.code;
      window._lastUrl = j.accessUrl;
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'copy-link') {
    const url = `${location.origin}/code?c=${encodeURIComponent(l.code)}`;
    try { await navigator.clipboard.writeText(url); toast('LINK COPIED', 'ok'); }
    catch { prompt('Copy this link:', url); }
  }
  else if (action === 'preview') {
    const url = `${location.origin}/code?c=${encodeURIComponent(l.code)}`;
    const text = `To: ${l.email}\nCode: ${l.code}\nLink: ${url}\n\n— A bilingual invitation email is sent automatically when you click APPROVE & SEND. Use COPY LINK to share the code manually.`;
    showModal('INVITATION · ' + l.code, text);
  }
  else if (action === 'revoke') {
    if (!confirm('Revoke this code? The member will lose access to the materials immediately.')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'revoke_code' });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('CODE REVOKED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'nda-view') {
    // Open the uploaded NDA in a new tab (server streams with admin auth)
    window.open(`/api/admin/nda-download?id=${encodeURIComponent(l.id)}`, '_blank', 'noopener');
  }
  else if (action === 'nda-view-archive') {
    const idx = btn ? btn.dataset.archive : null;
    if (idx === null || idx === undefined) return;
    window.open(`/api/admin/nda-download?id=${encodeURIComponent(l.id)}&archive=${encodeURIComponent(idx)}`, '_blank', 'noopener');
  }
  else if (action === 'nda-approve') {
    if (!confirm('Approve this NDA? The member will get access to the materials immediately.')) return;
    try {
      const j = await api('POST', '/api/admin/nda-review', { id: l.id, decision: 'approve' });
      // Reload the lead since approve.js doesn't return the full lead
      await refreshSelectedLead();
      toast('NDA APPROVED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'nda-reject') {
    const reason = prompt('Reason for rejection (visible to member):');
    if (!reason || !reason.trim()) return;
    try {
      const j = await api('POST', '/api/admin/nda-review', { id: l.id, decision: 'reject', reason: reason.trim() });
      await refreshSelectedLead();
      toast('NDA REJECTED · member will be notified', 'err');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'ioi-verify') {
    if (!confirm('Verify this IOI and send wire instructions to the member?')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'verify_ioi' });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      if (j.mail && j.mail.sent) toast('IOI VERIFIED · wire instructions sent', 'ok');
      else toast('IOI VERIFIED · email not sent (' + (j.mail?.reason || '?') + ')', 'err');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'wire-mark-wired') {
    if (!confirm('Mark wire as in-flight (sender confirmed remittance)?')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'mark_wired' });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('MARKED WIRED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'wire-mark-cleared') {
    if (!confirm('Wire cleared at custodian — admit member to the cohort? This sends the admission email.')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'mark_cleared' });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      if (j.mail && j.mail.sent) toast('ADMITTED · admission email sent', 'ok');
      else toast('ADMITTED · email failed (' + (j.mail?.reason || '?') + ')', 'err');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'wire-resend') {
    if (!confirm('Re-send the wire instructions email to the member?')) return;
    try {
      // Resend by re-running verify_ioi — backend is idempotent on the email path
      // but won't double-snapshot spot. Simpler: just re-call with action=verify_ioi.
      // Since verify_ioi rejects already-verified, we need a different path.
      // For now we approximate: just notify partner.
      toast('Use VERIFY → on a fresh IOI to issue. Instructions are sent automatically.', 'err');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  // ── Bars ────────────────────────────────────────────
  else if (action === 'bar-add') {
    const serial = ($('bar-serial').value || '').trim().toUpperCase();
    const kg = parseFloat($('bar-kg').value);
    const status = $('bar-status').value;
    const custodian = ($('bar-custodian').value || '').trim() || 'Singapore Freeport';
    if (!serial) { toast('SERIAL REQUIRED', 'err'); return; }
    if (!kg || kg <= 0) { toast('KG REQUIRED', 'err'); return; }
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'add_bar',
        serial, kg, bar_status: status, custodian,
      });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('BAR ASSIGNED · ' + serial, 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'bar-remove') {
    const serial = btn ? btn.dataset.serial : null;
    if (!serial) return;
    if (!confirm(`Remove bar ${serial} from this member?`)) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'remove_bar', serial });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('BAR REMOVED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  // ── LTV ─────────────────────────────────────────────
  else if (action === 'ltv-set') {
    const drawn_krw = parseFloat($('ltv-drawn-input').value) || 0;
    const ceiling_pct = parseFloat($('ltv-ceiling-input').value) || 65;
    const margin_pct = parseFloat($('ltv-margin-input').value) || 80;
    const facility_id = ($('ltv-facility-input').value || '').trim();
    if (ceiling_pct < 0 || ceiling_pct > 100) { toast('CEILING 0-100', 'err'); return; }
    if (margin_pct < 0 || margin_pct > 100) { toast('MARGIN 0-100', 'err'); return; }
    if (margin_pct < ceiling_pct) { toast('MARGIN MUST BE ≥ CEILING', 'err'); return; }
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'set_ltv',
        drawn_krw, ceiling_pct, margin_pct, facility_id,
      });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('LTV UPDATED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  // ── Documents ───────────────────────────────────────
  else if (action === 'doc-add') {
    const kind = $('doc-kind').value;
    const label = ($('doc-label').value || '').trim();
    const url = ($('doc-url').value || '').trim();
    const version = ($('doc-version').value || '').trim();
    if (!label) { toast('LABEL REQUIRED', 'err'); return; }
    if (!url) { toast('URL REQUIRED', 'err'); return; }
    if (!/^https?:\/\//.test(url)) { toast('URL MUST BE HTTPS', 'err'); return; }
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'add_doc',
        kind, label, url, version,
      });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('DOCUMENT ADDED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'doc-upload') {
    const kind = $('doc-kind').value;
    const label = ($('doc-label').value || '').trim();
    const version = ($('doc-version').value || '').trim();
    const fileEl = $('doc-file');
    const file = fileEl && fileEl.files && fileEl.files[0];
    if (!label) { toast('LABEL REQUIRED', 'err'); return; }
    if (!file) { toast('FILE REQUIRED', 'err'); return; }
    if (file.size > 4 * 1024 * 1024) { toast('FILE > 4 MB', 'err'); return; }
    const ALLOWED = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];
    if (!ALLOWED.includes(file.type)) { toast('FILE MUST BE PDF, JPG, PNG', 'err'); return; }
    toast('UPLOADING ' + file.name + '...', 'ok');
    // Read file → base64
    const dataBase64 = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(',')[1] || '');
      r.onerror = () => reject(new Error('read failed'));
      r.readAsDataURL(file);
    });
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'upload_doc',
        kind, label, version,
        filename: file.name, contentType: file.type,

      upsertLead(j.lead);
      renderDetail();
      toast('DOCUMENT UPLOADED · ' + file.name, 'ok');

      upsertLead(j.lead);
      renderDetail();
      toast('DOCUMENT REMOVED', 'ok');

  else if (action === 'position-add') {

    const sector = ($('pos-sector').value || '').trim();
    const stage = ($('pos-stage').value || '').trim();

    if (committed_krw <= 0) { toast('COMMITTED MUST BE > 0', 'err'); return; }
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'add_position',
        code, sector, stage, type, committed_krw, drawn_krw, marked_krw,

      upsertLead(j.lead);
      renderDetail();
      toast('POSITION DEPLOYED · ' + code, 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'position-update-prompt') {
    const pos_id = btn ? btn.dataset.posId : null;
    const curDrawn = btn ? Number(btn.dataset.drawn) || 0 : 0;
    const curMarked = btn ? Number(btn.dataset.marked) || 0 : 0;

    const newMarked = prompt(`Marked (KRW). Current: ${curMarked.toLocaleString()}. Leave blank to keep.`);

    if (newMarked.trim() !== '') body.marked_krw = parseFloat(newMarked) || 0;

    try {
      const j = await api('POST', '/api/admin/update', body);
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('POSITION UPDATED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'position-remove') {
    const pos_id = btn ? btn.dataset.posId : null;
    if (!pos_id) return;
    if (!confirm('Remove this position? This cannot be undone (use update → status: written_off instead if you want to keep history).')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'remove_position', pos_id });

      upsertLead(j.lead);
      renderDetail();
      toast('POSITION REMOVED', 'ok');

  // ── Capital Calls ───────────────────────────────────
  else if (action === 'cc-add') {
    const position_code = ($('cc-position').value || '').trim().toUpperCase();
    const amount_krw = parseFloat($('cc-amount').value) || 0;
    const dateVal = ($('cc-response-by').value || '').trim();
    const response_by = dateVal ? new Date(dateVal + 'T00:00:00Z').getTime() : null;
    if (!position_code) { toast('POSITION REQUIRED', 'err'); return; }
    if (amount_krw <= 0) { toast('AMOUNT MUST BE > 0', 'err'); return; }
    if (!confirm(`Issue capital call for ${position_code} of ₩${amount_krw.toLocaleString()}? An email will be sent to the member.`)) return;
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'add_capital_call',
        position_code, amount_krw, response_by,
      });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('CAPITAL CALL ISSUED · email sent', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'cc-mark-paid') {
    const cc_id = btn ? btn.dataset.ccId : null;
    if (!cc_id) return;
    if (!confirm('Mark this capital call as paid?')) return;
    try {
      const j = await api('POST', '/api/admin/update', {
        id: l.id, action: 'update_capital_call', cc_id, status: 'paid',
      });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('CAPITAL CALL MARKED PAID', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'cc-remove') {
    const cc_id = btn ? btn.dataset.ccId : null;
    if (!cc_id) return;
    if (!confirm('Remove this capital call from the member portfolio?')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'remove_capital_call', cc_id });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('CAPITAL CALL REMOVED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  // ── Notification triggers ───────────────────────────
  else if (action === 'send-quarterly') {
    const period = ($('qe-period').value || '').trim();
    const docSelect = $('qe-doc');
    const opt = docSelect && docSelect.options[docSelect.selectedIndex];
    const statement_url = opt ? opt.dataset.url : '';
    if (!period) { toast('PERIOD REQUIRED', 'err'); return; }
    if (!confirm(`Send quarterly statement notification for ${period}?`)) return;
    try {
      await api('POST', '/api/admin/update', {
        id: l.id, action: 'send_quarterly_email', period, statement_url,
      });
      toast('QUARTERLY EMAIL SENT', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'send-wire-reminder') {
    if (!confirm('Send wire reminder email to ' + (l.email || 'member') + '?')) return;
    try {
      await api('POST', '/api/admin/update', { id: l.id, action: 'send_wire_reminder' });
      toast('WIRE REMINDER SENT', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
}

async function refreshSelectedLead() {
  if (!state.selected) return;
  const id = state.selected.id;
  try {
    const j = await api('GET', '/api/admin/list');
    state.leads = j.leads || [];
    state.stats = j.stats || null;
    const found = state.leads.find((x) => x.id === id);
    if (found) state.selected = found;
    renderStats(); renderFilters(); renderList(); renderDetail();
  } catch {}
}

function upsertLead(l) {
  const i = state.leads.findIndex((x) => x.id === l.id);
  if (i >= 0) state.leads[i] = l;
  else state.leads.unshift(l);
  // recompute stats locally for snappy feel; full stats refreshed on next load
  if (state.stats) {
    const s = { total:0, new:0, reviewing:0, approved:0, sent:0, declined:0, by_tier:{}, last_24h:0, last_7d:0 };
    const now = Date.now();
    for (const x of state.leads) {
      s.total++;
      s[x.status] = (s[x.status]||0) + 1;
      if (x.wealth) s.by_tier[x.wealth] = (s.by_tier[x.wealth]||0) + 1;
      const age = now - (x.submitted_at_ms||0);
      if (age < 24*3600*1000) s.last_24h++;
      if (age < 7*24*3600*1000) s.last_7d++;
    }
    state.stats = s;
  }
}

// ── modal ────────────────────────────────────────────────────────────────
function showModal(h, body) { $('modal-h').textContent = h; $('modal-body').textContent = body; $('modal').classList.add('show'); }
$('modal-close').addEventListener('click', () => $('modal').classList.remove('show'));
$('modal').addEventListener('click', (e) => { if (e.target === $('modal')) $('modal').classList.remove('show'); });
$('modal-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText($('modal-body').textContent); toast('COPIED', 'ok'); } catch {}
});

// ── poll ─────────────────────────────────────────────────────────────────
setInterval(() => { if ($('app').classList.contains('show')) load(); }, 60_000);

// ── init ─────────────────────────────────────────────────────────────────
checkSession();

// keyboard: r to refresh, esc to deselect
document.addEventListener('keydown', (e) => {
  if (!$('app').classList.contains('show')) return;
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'r' || e.key === 'R') { load(); toast('REFRESHED','ok'); }
  if (e.key === 'Escape' && state.selected) {
    state.selected = null;
    try { const u = new URL(location.href); u.searchParams.delete('lead'); history.replaceState({}, '', u); } catch {}
    renderList(); renderDetail();
  }
});
</script>
