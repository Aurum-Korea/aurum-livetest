<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<title>Partners Console · Aurum</title>
<meta name="description" content="Private partners console.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg-2:#0c0c0c;--card:#0f0d0a;--card-2:#131210;--card-3:#191613;
  --text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;--dim:#3a3733;
  --gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;--goldDeep:#6a5a3a;
  --goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);
  --goldWash:rgba(197,165,114,0.04);--goldWashS:rgba(197,165,114,0.10);
  --goldGlow:rgba(197,165,114,0.20);--border:rgba(255,255,255,0.08);
  --red:#c77061;--redWash:rgba(199,112,97,0.08);--redBorder:rgba(199,112,97,0.40);
  --green:#7aa885;--greenWash:rgba(122,168,133,0.08);--greenBorder:rgba(122,168,133,0.40);
  --blue:#7e93b8;--blueWash:rgba(126,147,184,0.08);--blueBorder:rgba(126,147,184,0.40);
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --serifKr:'Noto Serif KR','Cormorant Garamond',Georgia,serif;
  --sans:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --pad-x:clamp(20px,4vw,56px);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100vh;min-width:320px}
a{color:inherit;text-decoration:none}em{font-style:italic}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;color:inherit}
::selection{background:rgba(197,165,114,0.30);color:var(--text)}

/* ── ambient ── */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 1200px 700px at 50% -10%,rgba(197,165,114,0.05),transparent 70%)}

/* ═══ LOGIN ═══ */
.login{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px var(--pad-x)}
.login-card{width:100%;max-width:380px;text-align:center}
.login-seal{width:56px;height:56px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:26px;letter-spacing:-0.04em;margin-bottom:22px;box-shadow:0 0 28px var(--goldGlow)}
.login-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:0.36em;color:var(--gold);margin-bottom:12px}
.login-title{font-family:var(--serif);font-weight:500;font-size:36px;line-height:1.1;letter-spacing:-0.01em;margin:0 0 6px}
.login-title em{font-style:italic;color:var(--gold)}
.login-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14.5px;margin:0 0 36px}
.login-form{display:flex;flex-direction:column;gap:18px}
.login-input{width:100%;padding:14px 0;background:transparent;border:0;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:18px;outline:none;text-align:center;letter-spacing:0.05em;transition:border-color .3s,box-shadow .3s}
.login-input:focus{border-bottom-color:var(--gold);box-shadow:0 1px 0 0 var(--gold)}
.login-input.error{border-bottom-color:var(--red)}
.login-btn{padding:16px 24px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:0.30em;text-transform:uppercase;border:1px solid var(--gold);background:var(--gold);color:var(--bg);transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:10px}
.login-btn:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB);box-shadow:0 8px 28px rgba(227,193,135,0.30)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-style:italic;font-size:13px;margin-top:6px;min-height:1.2em}
.login-foot{margin-top:48px;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--dim)}

/* ═══ APP ═══ */
.app{display:none;position:relative;z-index:1;min-height:100vh}
.app.show{display:block}

/* nav */
.nav{position:sticky;top:0;z-index:10;padding:14px var(--pad-x);background:rgba(10,10,10,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.nav-l{display:flex;align-items:center;gap:14px;min-width:0;flex:0 0 auto;color:inherit;text-decoration:none;cursor:pointer}
.nav-seal{width:30px;height:30px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:14px;letter-spacing:-0.04em;flex-shrink:0;transition:box-shadow .3s, border-color .3s, transform .3s}
.nav-l:hover .nav-seal{box-shadow:0 0 18px var(--goldGlow);border-color:var(--goldB);transform:scale(1.05)}
.nav-text{display:flex;flex-direction:column;line-height:1;min-width:0}
.nav-text .word{font-family:var(--sans);font-weight:600;font-size:12.5px;letter-spacing:0.32em;color:var(--text);white-space:nowrap}
.nav-text .sub{font-family:var(--mono);font-weight:400;font-size:8px;letter-spacing:0.36em;color:var(--goldD);margin-top:4px;white-space:nowrap}
.nav-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;flex:1 1 auto;min-width:0}
.partner-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:0.28em;color:var(--goldB);padding:6px 11px;border:1px solid var(--goldBorder);background:var(--goldWash);white-space:nowrap;flex-shrink:0}
.btn-ghost{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--sub);padding:7px 13px;border:1px solid var(--border);background:transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-ghost:hover{color:var(--goldB);border-color:var(--goldBorderS);background:var(--goldWash)}
.btn-gold{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--bg);padding:7px 13px;border:1px solid var(--gold);background:var(--gold);transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-gold:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--red);padding:7px 13px;border:1px solid var(--redBorder);background:var(--redWash);transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-danger:hover{color:var(--red);background:rgba(199,112,97,0.16)}

/* mobile nav — collapse to 2-row layout, drop letter-spacing tightness, scroll horizontally if needed */
@media (max-width:760px){
  .nav{padding:12px 16px;gap:10px}
  .nav-l{width:100%;justify-content:flex-start;border-bottom:1px solid var(--border);padding-bottom:10px}
  .nav-r{width:100%;justify-content:flex-end;gap:8px}
  .nav-text .word{font-size:11px;letter-spacing:0.22em}
  .nav-text .sub{font-size:7.5px;letter-spacing:0.28em}
  .partner-pill{font-size:9px;letter-spacing:0.22em;padding:5px 9px}
  .btn-ghost,.btn-gold,.btn-danger{font-size:9px;letter-spacing:0.20em;padding:6px 10px}
  /* Hide EXPORT NDAs on narrow phones — partners use desktop for that workflow */
  .nav-r .nav-export-mobile-hidden{display:none}
}

/* stats strip */
.stats{padding:22px var(--pad-x);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--bg-2)}
.stat{padding:0 22px;border-left:1px solid var(--border);min-width:0}
.stat:first-child{border-left:0;padding-left:0}
.stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldD);margin-bottom:6px;white-space:nowrap}
.stat-val{font-family:var(--serif);font-style:italic;font-size:30px;font-weight:500;line-height:1;color:var(--goldB);letter-spacing:-0.01em}
.stat-val .x{color:var(--muted);font-size:18px;font-style:normal;letter-spacing:0;margin-left:4px}
.stat-row{font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--sub);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.stat-row .pip{color:var(--goldD)}
@media (max-width:760px){
  .stats{grid-template-columns:1fr 1fr;padding:14px 16px;gap:0}
  .stat{padding:14px 12px;border-left:1px solid var(--border);border-top:1px solid var(--border)}
  .stat:nth-child(2n+1){border-left:0;padding-left:0}
  .stat:nth-child(-n+2){border-top:0;padding-top:0}
  .stat-val{font-size:24px}
  .stat-lbl{font-size:8.5px;letter-spacing:0.22em}
}

/* main grid */
.main{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1.45fr);gap:0;min-height:calc(100vh - 70px - 110px)}
@media (max-width:960px){.main{grid-template-columns:1fr}}

/* list pane */
.pane-list{border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0}
.list-head{padding:18px var(--pad-x) 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px;background:var(--bg-2)}
@media (max-width:760px){.list-head{padding:14px 16px 10px;gap:10px}}
.list-row1{display:flex;align-items:center;justify-content:space-between;gap:12px}
.list-title{font-family:var(--mono);font-size:10.5px;letter-spacing:0.32em;color:var(--goldB)}
.list-count{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:13px}
.search{position:relative}
.search input{width:100%;padding:11px 14px 11px 32px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:14px;outline:none;transition:border-color .2s,background .2s}
.search input:focus{border-color:var(--goldBorder);background:var(--card-2)}
.search input::placeholder{color:var(--muted);font-style:italic}
.search::before{content:'';position:absolute;left:11px;top:50%;width:13px;height:13px;margin-top:-7px;border:1.2px solid var(--goldD);border-radius:50%;pointer-events:none}
.search::after{content:'';position:absolute;left:21px;top:21px;width:7px;height:1.2px;background:var(--goldD);transform:rotate(45deg);pointer-events:none}

.filters{display:flex;flex-wrap:wrap;gap:6px}
.filter-chip{font-family:var(--mono);font-size:9px;letter-spacing:0.24em;padding:6px 10px;border:1px solid var(--border);background:transparent;color:var(--sub);transition:all .2s;white-space:nowrap}
.filter-chip:hover{border-color:var(--goldBorder);color:var(--text)}
.filter-chip.on{border-color:var(--gold);background:var(--goldWash);color:var(--goldB)}
.filter-chip .n{color:var(--goldD);margin-left:6px;font-weight:400}
.filter-chip.on .n{color:var(--gold)}
@media (max-width:760px){
  .filters{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;margin:0 -16px;padding:0 16px 4px}
  .filters::-webkit-scrollbar{display:none}
  .filter-chip{flex-shrink:0;font-size:8.5px;letter-spacing:0.18em;padding:5px 9px}
}

.list{flex:1;overflow-y:auto;max-height:calc(100vh - 70px - 110px - 132px)}
@media (max-width:960px){.list{max-height:none}}
.lead-row{padding:16px var(--pad-x);border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;transition:background .2s}
.lead-row:hover{background:var(--card)}
.lead-row.sel{background:var(--card-2);box-shadow:inset 3px 0 0 var(--gold)}
.lead-status{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.lead-status.s-new{background:var(--gold);box-shadow:0 0 10px var(--goldGlow)}
.lead-status.s-reviewing{background:var(--blue)}
.lead-status.s-approved{background:var(--green);box-shadow:0 0 10px rgba(122,168,133,0.4)}
.lead-status.s-sent{background:var(--green);opacity:.6}
.lead-status.s-declined{background:var(--red);opacity:.5}
.lead-mid{min-width:0}
.lead-name{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--text);line-height:1.2;letter-spacing:-0.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-name .ko{font-family:var(--serifKr);color:var(--goldD);font-weight:300;font-size:14px;margin-left:8px}
.lead-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:0.18em;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.lead-meta .tier{color:var(--goldB)}
.lead-meta .country{color:var(--sub)}
.lead-meta .sep{color:var(--dim)}
.lead-time{font-family:var(--mono);font-size:9.5px;letter-spacing:0.16em;color:var(--muted);text-align:right;flex-shrink:0;margin-top:4px}
.empty{padding:60px 32px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--serif);font-size:15px}

/* detail pane */
.pane-detail{display:flex;flex-direction:column;min-width:0;background:var(--bg-2)}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 32px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--serif);font-size:16px}
.detail-empty .seal{display:inline-block;width:36px;height:36px;border:1px solid var(--goldBorder);font-family:var(--serif);font-style:italic;color:var(--goldD);font-size:18px;line-height:34px;letter-spacing:-0.04em;margin-bottom:16px}

.detail{padding:28px var(--pad-x) 60px;max-width:780px}
@media (max-width:760px){
  .detail{padding:18px 16px 60px}
  .section{margin:0 0 22px}
}
.det-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.32em;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.det-eyebrow .id{color:var(--muted);font-size:9px}
.det-name{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.05;letter-spacing:-0.015em;color:var(--text);margin:0 0 6px}
.det-name em{font-style:italic;color:var(--gold)}
.det-name .ko{display:inline-block;font-family:var(--serifKr);font-weight:300;color:var(--goldD);font-size:24px;margin-left:14px;letter-spacing:0}
.det-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:15.5px;margin:0 0 28px}

.status-bar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 28px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.status-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:0.26em;padding:8px 12px;border:1px solid var(--border);background:transparent;color:var(--sub);transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.status-pill:hover{border-color:var(--goldBorder);color:var(--text)}
.status-pill.on.new{border-color:var(--gold);color:var(--gold);background:var(--goldWash)}
.status-pill.on.reviewing{border-color:var(--blueBorder);color:var(--blue);background:var(--blueWash)}
.status-pill.on.approved,.status-pill.on.sent{border-color:var(--greenBorder);color:var(--green);background:var(--greenWash)}
.status-pill.on.declined{border-color:var(--redBorder);color:var(--red);background:var(--redWash)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* facts */
.facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;border:1px solid var(--border);background:var(--card);margin:0 0 28px}
.fact{padding:16px 20px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.fact:last-child{border-right:0}
@media (max-width:680px){.fact{border-right:0}}
.fact-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldD);margin-bottom:6px}
.fact-val{font-family:var(--serif);font-size:15.5px;color:var(--text);font-weight:400;word-break:break-word}
.fact-val a{color:var(--goldB);border-bottom:1px solid var(--goldBorder);transition:border-color .2s}
.fact-val a:hover{border-bottom-color:var(--gold)}
.fact-val em{font-style:italic;color:var(--goldB)}

/* note from member */
.note-block{padding:18px 22px;border:1px solid var(--goldBorder);border-left:2px solid var(--gold);background:var(--card);margin:0 0 28px;font-family:var(--serif);font-style:italic;font-size:15.5px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.note-block .lbl{display:block;font-style:normal;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--gold);margin-bottom:10px}

/* sections */
.section{margin:0 0 28px}
.sec-h{font-family:var(--mono);font-size:10px;letter-spacing:0.32em;color:var(--gold);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--goldBorder)}

/* approve panel */
.approve-panel{padding:22px;border:1px solid var(--goldBorder);background:linear-gradient(180deg,var(--goldWash),transparent);margin:0 0 28px}
.approve-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.code-box{flex:1;min-width:200px;padding:14px 18px;background:var(--bg);border:1px solid var(--goldBorderS);font-family:var(--mono);font-size:16px;letter-spacing:0.18em;color:var(--goldB);text-align:center}
.code-box.empty{color:var(--muted);font-style:italic;font-size:13px;letter-spacing:0.04em;font-family:var(--serif)}
.btn-big{padding:13px 22px;font-family:var(--mono);font-size:11px;letter-spacing:0.28em;border:1px solid var(--gold);background:var(--gold);color:var(--bg);transition:all .2s;display:inline-flex;align-items:center;gap:9px;white-space:nowrap}
.btn-big:hover:not(:disabled){background:var(--goldB);box-shadow:0 6px 24px rgba(227,193,135,0.3)}
.btn-big:disabled{opacity:.4;cursor:not-allowed}
.btn-tab{padding:8px 14px;background:transparent;border:0;font-family:var(--mono);font-size:9.5px;letter-spacing:0.24em;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);transition:all .15s}
.btn-tab:last-child{border-right:0}
.btn-tab:hover{color:var(--text)}
.btn-tab.active{background:var(--goldWashS);color:var(--gold)}
.btn-big.outline{background:transparent;color:var(--gold)}
.btn-big.outline:hover:not(:disabled){background:var(--goldWashS)}
.approve-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:0.22em;color:var(--muted);margin-top:14px;display:flex;flex-wrap:wrap;gap:12px}
.approve-meta .ok{color:var(--green)}
.approve-meta .warn{color:var(--gold)}
.approve-meta .err{color:var(--red)}

/* NDA panel */
.nda-panel{padding:22px;border:1px solid var(--border);background:var(--card);margin:0 0 28px}
.nda-panel.nda-inactive{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14px;text-align:center;padding:18px}
.nda-panel.nda-awaiting{border-color:var(--goldBorder);background:linear-gradient(180deg,rgba(197,165,114,0.03),transparent)}
.nda-panel.nda-uploaded{border-color:var(--goldBorderS);background:linear-gradient(180deg,var(--goldWash),transparent)}
.nda-panel.nda-approved{border-color:rgba(122,168,133,0.35);background:linear-gradient(180deg,rgba(122,168,133,0.04),transparent)}
.nda-panel.nda-rejected{border-color:rgba(199,112,97,0.40);background:linear-gradient(180deg,rgba(199,112,97,0.04),transparent)}
.nda-row{display:flex;gap:14px;align-items:flex-start}
.nda-pip{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-top:5px;flex-shrink:0}
.nda-panel.nda-awaiting .nda-pip{background:var(--goldD)}
.nda-panel.nda-uploaded .nda-pip{background:var(--gold);box-shadow:0 0 8px var(--goldGlow)}

.btn-big-danger{padding:13px 22px;font-family:var(--mono);font-size:11px;letter-spacing:0.28em;border:1px solid var(--red);background:transparent;color:var(--red);transition:all .2s;display:inline-flex;align-items:center;gap:9px;white-space:nowrap;cursor:pointer}

.nda-tag{font-family:var(--mono);font-size:9px;letter-spacing:0.20em;padding:1px 6px;border:1px solid var(--border);text-transform:uppercase}

/* NDA archive list — historical/superseded uploads */
.nda-archive-block{margin-top:10px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-left:2px solid var(--goldDeep)}

.nda-archive-list{display:flex;flex-direction:column;gap:8px}
.nda-arch-row{display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,0.05);font-family:var(--mono);font-size:11px}
.nda-arch-row:last-child{border-bottom:0}
.nda-arch-meta{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.nda-arch-num{color:var(--goldDeep);font-size:9.5px;letter-spacing:0.20em;flex-shrink:0;width:24px}
.nda-arch-name{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.nda-arch-size{color:var(--muted);font-size:9.5px;flex-shrink:0}

.nda-arch-when .ok{color:var(--green)}

.btn-tiny:hover{color:var(--goldB);border-color:var(--goldBorderS);background:var(--goldWash)}

/* ── IOI / KYC / Profile / Wire panels ───────────────────────────────── */
.flow-panel{padding:20px;border:1px solid var(--border);background:var(--card);margin:0 0 28px}
.flow-panel.f-pending{border-color:var(--border);background:var(--card)}

.flow-panel.f-failed .flow-pip{background:var(--red)}
.flow-body{flex:1;min-width:0}
.flow-head{font-family:var(--mono);font-size:9.5px;letter-spacing:0.30em;text-transform:uppercase;margin-bottom:6px;color:var(--muted)}

.flow-panel.f-done .flow-head{color:var(--green)}
.flow-panel.f-failed .flow-head{color:var(--red)}

/* IOI panel — facts grid */

/* Profile panel */

/* notes */

.note-item{padding:13px 16px;background:var(--card);border-left:2px solid var(--goldBorder);font-family:var(--serif);font-size:14.5px;line-height:1.6;color:var(--text);white-space:pre-wrap}

.note-form .row{display:flex;justify-content:flex-end}

/* audit */
.audit-list{display:flex;flex-direction:column}
.audit-item{padding:9px 0;border-bottom:1px dashed var(--border);font-family:var(--mono);font-size:10px;letter-spacing:0.10em;color:var(--sub);display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:center}
.audit-item:last-child{border-bottom:0}

/* toast */

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--redBorder);color:var(--red)}

/* preview modal */
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}

/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:1.6px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}

/* Mobile back button — hidden on desktop, shown inside the @media block below */

/* ─── Partner-seal hover treatment (lift the "dead" feeling) ─── */

}

/* ═══════════════════════════════════════════════════════════════
   MOBILE — partner dashboard (≤960px)
   ═══════════════════════════════════════════════════════════════ */
@media (max-width:960px){

  /* Nav: lockup left, all action buttons in one wrappable row right */

  .nav-r .btn-gold{font-size:9px;letter-spacing:0.18em;padding:6px 9px}

  /* Stats — 2x2 grid, properly bounded */

  .stat:nth-child(2n){border-right:0}
  .stat:nth-child(n+3){border-bottom:0}
  .stat-val{font-size:26px}
  .stat-lbl{font-size:9px;letter-spacing:0.24em}
  .stat-row{font-size:9px;letter-spacing:0.10em;line-height:1.55;margin-top:6px}

  /* Pane toggle — REAL switching */
  .main{grid-template-columns:1fr;min-height:auto}
  .pane-list{display:flex}
  .pane-detail{display:none}
  .pane-list.has-sel{display:none}
  .pane-detail.has-sel{display:flex}
  /* Hide stats band when viewing a lead's detail (cleaner focus) */
  .stats{transition:max-height .25s ease;overflow:hidden}
  .app:has(.pane-detail.has-sel) .stats{max-height:0;padding:0;border:0}

  /* Back button on mobile detail pane */
  .back-mob{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:0.28em;color:var(--gold);background:transparent;border:0;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);margin-bottom:0}
  .back-mob:hover{color:var(--goldB)}

  /* Filter chips wrap to multiple rows; each chip stays compact */
  #filters{flex-wrap:wrap;padding:0 16px 14px;gap:6px}
  .filter-chip{flex-shrink:0;font-size:8.5px;letter-spacing:0.18em;padding:5px 9px}

  /* List padding consistent */
  .list-head{padding:14px 16px}
  .list-search-wrap,#search-wrap{padding:0 16px 14px}
  .lead-row{padding:14px 16px;gap:10px}

  /* Detail content */
  .detail{padding:0}
  .section{padding:18px 16px;margin-bottom:14px}
  .sec-h{font-size:13px;letter-spacing:0.24em}

  /* Form rows stack on mobile */
  .approve-row,
  .flow-actions{flex-direction:column;align-items:stretch;gap:8px}
  .approve-row .btn-big,
  .flow-actions .btn-big{width:100%;justify-content:center}

  /* Tables — let admin tables scroll horizontally if too wide */
  .section table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// AURUM PARTNERS CONSOLE
// ═══════════════════════════════════════════════════════════════════════════

const $  = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const TIER_LBL = {
  '250k_500k':'$250K – $500K · Emerging',
  '500k_2m':'$500K – $2M · Established',
  '2m_5m':'$2M – $5M · Senior',
  '5m_plus':'$5M+ · Principal',
};
const TIER_SHORT = {'250k_500k':'$250–500K','500k_2m':'$500K–2M','2m_5m':'$2–5M','5m_plus':'$5M+'};
const COUNTRY_LBL = {KR:'South Korea',SG:'Singapore',HK:'Hong Kong SAR',JP:'Japan',US:'United States',GB:'United Kingdom',AU:'Australia',CA:'Canada',CH:'Switzerland',AE:'UAE',OTHER:'Other'};
const STATUS_LBL = {new:'NEW',reviewing:'REVIEWING',approved:'APPROVED',sent:'SENT',declined:'DECLINED'};

let state = {
  userId: null,
  email: null,
  leads: [],
  stats: null,
  selected: null,
  filter: { status: 'all', tier: 'all', q: '' },
};

// ── toast ────────────────────────────────────────────────────────────────
function toast(msg, kind='') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── api ──────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials:'same-origin' };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  let j = null;
  try { j = await r.json(); } catch {}
  if (!r.ok) throw new Error((j && j.error) || ('HTTP ' + r.status));
  return j;
}

// ── session ──────────────────────────────────────────────────────────────
async function checkSession() {
  try {
    const j = await api('GET', '/api/me');
    state.userId = (j.id || '').toUpperCase() || null;
    state.email = j.email || null;
    showApp();
  } catch {
    redirectToLogin();
  }
}
function redirectToLogin() {
  // Preserve intent: send the user back to /admin after they sign in.
  var next = encodeURIComponent('/admin' + window.location.search + window.location.hash);
  window.location.replace('/members?next=' + next);
}
function showApp() {
  $('login').style.display = 'none';
  $('app').classList.add('show');
  var label = state.userId || (state.email ? state.email.split('@')[0].toUpperCase() : '—');
  $('partner-pill').textContent = label;
  $('partner-pill').title = state.email || '';
  load();
}

$('btn-logout').addEventListener('click', async () => {
  try { await api('POST', '/api/logout'); } catch {}
  state.userId = null; state.email = null; state.selected = null; state.leads = [];
  redirectToLogin();
});

$('btn-refresh').addEventListener('click', () => { load(); toast('REFRESHED', 'ok'); });

$('btn-export-nda').addEventListener('click', () => {
  // Triggers a CSV download — the browser handles the file naming via the
  // Content-Disposition header set by the endpoint.
  window.location.href = '/api/admin/nda-archive?format=csv';
  toast('NDA MANIFEST DOWNLOADING…', 'ok');
});

// ── load ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const j = await api('GET', '/api/admin/list');
    state.leads = j.leads || [];
    state.stats = j.stats || null;
    renderStats();
    renderFilters();
    renderList();
    if (state.selected) {
      const updated = state.leads.find((l) => l.id === state.selected.id);
      if (updated) { state.selected = updated; renderDetail(); }
    } else {
      // If URL has ?lead=ID, open it
      const u = new URL(location.href);
      const lid = u.searchParams.get('lead');
      if (lid) {
        const found = state.leads.find((l) => l.id === lid);
        if (found) selectLead(found);
      }
    }
  } catch (e) {
    if (String(e.message).includes('401') || String(e.message).toLowerCase().includes('unauth')) {
      showLogin();
    } else {
      toast('LOAD FAILED · ' + e.message, 'err');
    }
  }
}

// ── stats ────────────────────────────────────────────────────────────────
function renderStats() {
  const s = state.stats || {};
  $('s-total').textContent = s.total ?? 0;
  $('s-total-row').innerHTML = `<span class="pip">+${s.last_7d || 0} this week</span>`;
  $('s-24h').textContent = s.last_24h ?? 0;
  $('s-7d-row').textContent = (s.last_7d || 0) + ' over 7 days';
  const open = (s.new || 0) + (s.reviewing || 0);
  $('s-pipeline').innerHTML = `${open}<span class="x">/${s.total||0}</span>`;
  $('s-status-row').innerHTML =
    `<span class="pip">${s.new||0} new</span>` +
    `<span class="pip">${s.reviewing||0} reviewing</span>` +
    `<span class="pip">${(s.approved||0)+(s.sent||0)} approved</span>`;
  // top tier
  const tiers = s.by_tier || {};
  let topKey = null, topN = -1;
  for (const k of Object.keys(tiers)) if (tiers[k] > topN) { topN = tiers[k]; topKey = k; }
  $('s-tier-top').textContent = topKey ? TIER_SHORT[topKey] : '—';
  $('s-tier-row').innerHTML = Object.keys(TIER_SHORT).map((k) =>
    `<span class="pip">${TIER_SHORT[k]} <strong style="color:var(--goldB)">${tiers[k]||0}</strong></span>`
  ).join('');
}

// ── filters ──────────────────────────────────────────────────────────────
function renderFilters() {
  const s = state.stats || {};
  const items = [
    {k:'all', l:'ALL', n: s.total||0},
    {k:'new', l:'NEW', n: s.new||0},
    {k:'reviewing', l:'REVIEWING', n: s.reviewing||0},
    {k:'approved', l:'APPROVED', n: (s.approved||0)+(s.sent||0)},
    {k:'declined', l:'DECLINED', n: s.declined||0},
  ];
  $('filters').innerHTML = items.map((it) =>
    `<button class="filter-chip ${state.filter.status===it.k?'on':''}" data-status="${it.k}">${it.l} <span class="n">${it.n}</span></button>`
  ).join('');
  $('filters').querySelectorAll('.filter-chip').forEach((b) =>
    b.addEventListener('click', () => { state.filter.status = b.dataset.status; renderFilters(); renderList(); })
  );
}

$('search').addEventListener('input', (e) => { state.filter.q = e.target.value.trim().toLowerCase(); renderList(); });

// ── list ─────────────────────────────────────────────────────────────────
function filterLeads() {
  return state.leads.filter((l) => {
    if (state.filter.status !== 'all') {
      if (state.filter.status === 'approved') {
        if (l.status !== 'approved' && l.status !== 'sent') return false;
      } else if (l.status !== state.filter.status) return false;
    }
    if (state.filter.q) {
      const hay = [l.name, l.name_ko, l.email, l.country, l.code, l.referral, l.note].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(state.filter.q)) return false;
    }
    return true;
  });
}
function renderList() {
  const filtered = filterLeads();
  $('list-count').textContent = filtered.length === state.leads.length ? `${filtered.length}` : `${filtered.length} of ${state.leads.length}`;
  const list = $('list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${state.leads.length ? 'No matches.' : 'No inquiries yet. The form is live.'}</div>`;
    return;
  }
  list.innerHTML = filtered.map((l) => {
    const sel = state.selected && state.selected.id === l.id;
    const tier = TIER_SHORT[l.wealth] || '—';
    const country = COUNTRY_LBL[l.country] || l.country || '—';
    const ndaTag = ndaShortTag(l);
    return `
      <div class="lead-row ${sel?'sel':''}" data-id="${esc(l.id)}">
        <span class="lead-status s-${esc(l.status||'new')}" title="${STATUS_LBL[l.status]||l.status||'NEW'}"></span>
        <div class="lead-mid">
          <div class="lead-name">${esc(l.name||'Unnamed')}${l.name_ko?`<span class="ko">${esc(l.name_ko)}</span>`:''}</div>
          <div class="lead-meta">
            <span class="tier">${esc(tier)}</span>
            <span class="sep">·</span>
            <span class="country">${esc(country)}</span>
            ${l.code ? `<span class="sep">·</span><span style="color:var(--goldB);font-family:var(--mono)">${esc(l.code)}</span>` : ''}
            ${ndaTag}
          </div>
        </div>
        <div class="lead-time">${relTime(l.submitted_at_ms)}</div>
      </div>`;
  }).join('');
  list.querySelectorAll('.lead-row').forEach((r) => {
    r.addEventListener('click', () => {
      const lead = state.leads.find((x) => x.id === r.dataset.id);
      if (lead) selectLead(lead);
    });
  });
}
function ndaShortTag(l) {
  if (l.nda_state === 'uploaded') return '<span class="sep">·</span><span class="nda-tag rev" title="NDA awaiting partner review">NDA · REVIEW</span>';
  if (l.nda_state === 'approved') return '<span class="sep">·</span><span class="nda-tag ok" title="NDA approved">NDA ✓</span>';
  if (l.nda_state === 'rejected') return '<span class="sep">·</span><span class="nda-tag err" title="NDA rejected — member must re-upload">NDA ✗</span>';
  return '';
}

function relTime(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  if (diff < 60_000) return 'now';
  if (diff < 3600_000) return Math.floor(diff/60_000) + 'm';
  if (diff < 86400_000) return Math.floor(diff/3600_000) + 'h';
  if (diff < 7*86400_000) return Math.floor(diff/86400_000) + 'd';
  const d = new Date(ms);
  return d.toLocaleDateString('en-CA');
}
function selectLead(l) {
  state.selected = l;
  renderList();
  renderDetail();
  // mobile: switch to detail pane by toggling .has-sel on both panes.
  // CSS uses `.pane-detail.has-sel { display:flex }` and `.pane-list.has-sel { display:none }`
  // at <= 960px, so adding the class on both flips which one is visible.
  if (window.matchMedia('(max-width:960px)').matches) {
    $('pane-list').classList.add('has-sel');
    $('pane-detail').classList.add('has-sel');
    // Scroll window to top so the back button is visible above the detail content
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  // update URL
  try { const u = new URL(location.href); u.searchParams.set('lead', l.id); history.replaceState({}, '', u); } catch {}
}

function fmtBytes(n) {
  if (!n) return '0 B';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/(1024*1024)).toFixed(2) + ' MB';
}

function renderNdaPanel(l) {
  const state = l.nda_state || (l.code && !l.code_revoked ? 'awaiting' : 'inactive');
  const archive = Array.isArray(l.nda_archive) ? l.nda_archive : [];
  const archiveBlock = archive.length ? renderNdaArchive(l, archive) : '';

  if (state === 'inactive') {
    return `<div class="nda-panel nda-inactive">Issue an invitation code first — the NDA gate activates when the member is approved.</div>${archiveBlock}`;
  }
  if (state === 'awaiting') {
    return `<div class="nda-panel nda-awaiting">
      <div class="nda-row">
        <span class="nda-pip"></span>
        <div class="nda-body">
          <div class="nda-head">AWAITING UPLOAD</div>
          <div class="nda-msg">The member has not yet uploaded a signed NDA.</div>
        </div>
      </div>
    </div>${archiveBlock}`;
  }
  // uploaded / approved / rejected — file is present
  const fileName = esc(l.nda_file_name || 'signed.pdf');
  const fileSize = fmtBytes(l.nda_file_size || 0);
  const upAt = l.nda_uploaded_at ? esc(fmtDate(l.nda_uploaded_at)) : '—';
  const revAt = l.nda_reviewed_at ? esc(fmtDate(l.nda_reviewed_at)) : '';
  const revBy = l.nda_reviewed_by ? esc(String(l.nda_reviewed_by).toUpperCase()) : '';
  const actions = state === 'uploaded'
    ? `<button class="btn-big" data-action="nda-approve">APPROVE NDA →</button>
       <button class="btn-big outline" data-action="nda-view">VIEW FILE</button>
       <button class="btn-big-danger" data-action="nda-reject">REJECT</button>`
    : state === 'approved'
      ? `<button class="btn-big outline" data-action="nda-view">VIEW FILE</button>
         <button class="btn-big-danger" data-action="nda-reject">REVOKE & REJECT</button>`
      : /* rejected */
        `<button class="btn-big outline" data-action="nda-view">VIEW LAST UPLOAD</button>
         <span class="nda-meta-pill warn">Awaiting member re-upload</span>`;

  const reasonBlock = state === 'rejected' && l.nda_rejection_reason
    ? `<div class="nda-reason">Rejection reason: <em>${esc(l.nda_rejection_reason)}</em></div>`
    : '';

  return `<div class="nda-panel nda-${state}">
    <div class="nda-row">
      <span class="nda-pip"></span>
      <div class="nda-body">
        <div class="nda-head">${state === 'uploaded' ? 'AWAITING REVIEW' : (state === 'approved' ? 'APPROVED' : 'REJECTED — RE-UPLOAD PENDING')}</div>
        <div class="nda-msg"><span style="font-family:var(--mono);font-size:11px;color:var(--text)">${fileName}</span> <span style="color:var(--muted);font-family:var(--mono);font-size:10px">· ${fileSize}</span></div>
        <div class="nda-meta">
          <span>Uploaded ${upAt}</span>
          ${revAt ? `<span class="${state==='approved'?'ok':'err'}">${state==='approved' ? '✓ Approved' : '✗ Rejected'} ${revAt} · ${revBy}</span>` : ''}
        </div>
        ${reasonBlock}
      </div>
    </div>
    <div class="nda-actions">${actions}</div>
  </div>${archiveBlock}`;
}

// ── KYC panel ──────────────────────────────────────────────────────────
function renderKycPanel(l) {
  // KYC is gated behind NDA approval. Show empty state until then.
  if (!l.nda_state || l.nda_state !== 'approved') {
    return `<div class="flow-panel f-empty">KYC activates after the NDA is countersigned.</div>`;
  }
  const k = l.kyc || { status: 'pending' };
  const status = k.status || 'pending';
  const cls = status === 'verified' ? 'f-done' : status === 'failed' ? 'f-failed' : (status === 'started' ? 'f-active' : 'f-pending');
  const label = status === 'verified' ? 'VERIFIED' : status === 'failed' ? 'FAILED' : status === 'started' ? 'IN PROGRESS' : 'PENDING';

  let msg;
  if (status === 'verified') {
    msg = k.stub
      ? 'Identity verified. <span style="color:var(--goldD);font-style:italic">[Stub mode — wire real Useb credentials before going live]</span>'
      : 'Identity verified by Useb.';
  } else if (status === 'failed') {
    msg = `Verification failed${k.failure_reason ? ': ' + esc(k.failure_reason) : '.'}`;
  } else if (status === 'started') {
    msg = 'Member has begun the Useb mobile-KYC flow.';
  } else {
    msg = 'Awaiting member to begin verification on /ioi.';
  }

  const meta = [];
  if (k.started_at) meta.push(`Started ${esc(fmtDate(k.started_at))}`);
  if (k.verified_at) meta.push(`<span class="ok">✓ Verified ${esc(fmtDate(k.verified_at))}</span>`);
  if (k.ref) meta.push(`Ref: <span style="font-family:var(--mono);color:var(--text)">${esc(k.ref)}</span>`);

  return `<div class="flow-panel ${cls}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${label}</div>
        <div class="flow-msg">${msg}</div>
        ${meta.length ? `<div class="flow-meta">${meta.join('')}</div>` : ''}
      </div>
    </div>
  </div>`;
}

      ${cell('Net Worth', nwLbl)}

      ${cell('Source of Funds (Commit)', sofLbl)}
      ${cell('Korean FX Bank', p.korean_fx_bank)}

    ${p.offshore_exposure_text ? `<div class="ioi-sigblock" style="margin-top:14px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:0.26em;color:var(--goldD);margin-bottom:6px">OFFSHORE EXPOSURE</div>${esc(p.offshore_exposure_text)}</div>` : ''}
  </div>`;
}

// ── IOI panel ──────────────────────────────────────────────────────────
function renderIoiPanel(l) {
  if (!l.ioi || !l.ioi.submitted_at) {
    return `<div class="flow-panel f-empty">IOI submitted by member after KYC verification on /ioi.</div>`;
  }
  const i = l.ioi;
  const verified = !!l.ioi_verified_at;
  const cls = verified ? 'f-done' : 'f-active';
  const label = verified ? 'VERIFIED — wire instructions sent' : 'AWAITING VERIFICATION';

  // Per round-2: always 억/만, single format, no dual-display.
  const krwAtSubmit = fmtKrw(i.krw_at_submit);
  const krwAtVerify = i.krw_at_verify ? fmtKrw(i.krw_at_verify) : '—';
  const krwAtSettle = i.krw_at_settle ? fmtKrw(i.krw_at_settle) : '— (post-conversion)';

  // Computed: investable cash unlocked at requested LTV
  const investableCash = i.krw_at_submit && i.ltv_pct ? Math.round(i.krw_at_submit * (i.ltv_pct / 100)) : 0;
  const workingCapital = (i.krw_at_submit || 0) + investableCash;

  const cb = i.checkboxes || {};
  const cbItems = [
    ['Non-binding indication acknowledged', cb.indicative],
    ['Read materials', cb.materials],
    ['Will commit within 7 BD of wire instructions', cb.seven_day],
    ['Spot-caveat acknowledged (settle = wire+2BD)', cb.spot_caveat],
  ];

  const actions = verified
    ? `<span class="flow-meta" style="margin-top:0"><span class="ok">✓ Verified ${esc(fmtDate(l.ioi_verified_at))}${l.ioi_verified_by ? ' · ' + esc(String(l.ioi_verified_by).toUpperCase()) : ''}</span></span>`
    : `<button class="btn-big" data-action="ioi-verify">VERIFY → SEND WIRE INSTRUCTIONS</button>`;

  return `<div class="flow-panel ${cls}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${label}</div>
        <div class="flow-msg"><strong style="color:var(--goldB);font-family:var(--mono);font-size:18px;letter-spacing:0.04em">${i.kg.toFixed(2)} kg</strong> &nbsp;·&nbsp; LTV requested ${i.ltv_pct}%</div>
        <div class="flow-meta">Submitted ${esc(fmtDate(i.submitted_at))}</div>
      </div>
    </div>
    <div class="ioi-facts">
      <div class="ioi-fact"><div class="lbl">Commitment</div><div class="val gold">${i.kg.toFixed(4)} kg</div><div class="sub">primary, signed</div></div>
      <div class="ioi-fact"><div class="lbl">Gold value @ IOI</div><div class="val">${krwAtSubmit}</div></div>
      <div class="ioi-fact"><div class="lbl">LTV requested</div><div class="val">${i.ltv_pct}%</div></div>
      <div class="ioi-fact"><div class="lbl">Investable cash</div><div class="val">${fmtKrw(investableCash)}</div><div class="sub">at requested LTV</div></div>
      <div class="ioi-fact"><div class="lbl">Working capital</div><div class="val">${fmtKrw(workingCapital)}</div><div class="sub">gold + cash</div></div>
      <div class="ioi-fact"><div class="lbl">KRW @ Verify</div><div class="val">${krwAtVerify}</div></div>
      <div class="ioi-fact"><div class="lbl">KRW @ Settle</div><div class="val">${krwAtSettle}</div></div>
    </div>
    <div class="ioi-sigblock">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.26em;color:var(--goldD);margin-bottom:6px">SIGNATURE · 서명</div>
      <span class="sig">${esc(i.signature || '')}</span>
    </div>
    <div class="ioi-checklist">
      ${cbItems.map(([lbl, v]) => `<div class="${v ? 'ok' : ''}">${v ? '✓' : '·'} ${esc(lbl)}</div>`).join('')}
    </div>
    <div class="flow-actions">${actions}</div>
  </div>`;
}

// ── Wire panel ─────────────────────────────────────────────────────────
function renderWirePanel(l) {
  if (!l.wire || !l.wire.instructions_sent_at) {
    return `<div class="flow-panel f-empty">Wire instructions are issued automatically when you click <strong>VERIFY</strong> on the IOI panel above.</div>`;
  }
  const w = l.wire;
  const stage = w.cleared_at ? 'cleared' : (w.wired_at ? 'wired' : 'sent');
  const cls = stage === 'cleared' ? 'f-done' : 'f-active';
  const label = stage === 'cleared' ? 'CLEARED — admitted' : (stage === 'wired' ? 'IN FLIGHT — awaiting clearance' : 'INSTRUCTIONS SENT — awaiting wire');

  const meta = [];
  meta.push(`Instructions sent ${esc(fmtDate(w.instructions_sent_at))}`);
  if (w.wired_at) meta.push(`<span class="warn">↗ Marked wired ${esc(fmtDate(w.wired_at))}</span>`);
  if (w.cleared_at) meta.push(`<span class="ok">✓ Cleared ${esc(fmtDate(w.cleared_at))}</span>`);

  let actions = '';
  if (stage === 'sent') {
    actions = `<button class="btn-big" data-action="wire-mark-wired">MARK WIRED →</button>
               <button class="btn-big outline" data-action="wire-resend">RESEND INSTRUCTIONS</button>`;
  } else if (stage === 'wired') {
    actions = `<button class="btn-big" data-action="wire-mark-cleared">MARK CLEARED · ADMIT →</button>`;
  } else {
    actions = `<span class="nda-meta-pill" style="color:var(--green);border-color:rgba(122,168,133,0.30);background:rgba(122,168,133,0.06)">ADMITTED — admission email sent</span>`;
  }

  return `<div class="flow-panel ${cls}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${label}</div>
        <div class="flow-msg"><span class="wire-ref">${esc(w.ref || '—')}</span></div>
        <div class="flow-meta">${meta.join('')}</div>
      </div>
    </div>
    <div class="flow-actions">${actions}</div>
  </div>`;
}

// ── Bars panel — assign serial numbers to allocated kg ────────────────
function renderBarsPanel(l) {
  // Bars only relevant after wire clears (member is admitted). Show empty state otherwise.
  if (!l.wire || !l.wire.cleared_at) {
    return `<div class="flow-panel f-empty">Bars activate after wire clears (member admitted to cohort).</div>`;
  }
  const bars = l.bars || [];
  const totalKg = bars.reduce((sum, b) => sum + (b.kg || 0), 0);
  const expectedKg = (l.ioi && l.ioi.kg) || 0;
  const remaining = Math.max(0, expectedKg - totalKg);

  let rows = '';
  if (bars.length) {
    rows = `<table class="bars-table" style="width:100%;border-collapse:collapse;margin:12px 0">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD);text-transform:uppercase">Serial</th>
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">KG</th>
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Status</th>
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Custodian</th>
          <th style="text-align:right;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Action</th>
        </tr>
      </thead>
      <tbody>`;
    for (const b of bars) {
      rows += `<tr style="border-bottom:1px dashed var(--rule)">
        <td style="padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);letter-spacing:0.10em">${esc(b.serial)}</td>
        <td style="padding:10px;font-family:var(--mono);font-size:11px;color:var(--goldB)">${(b.kg || 0).toFixed(2)} kg</td>
        <td style="padding:10px;font-family:var(--mono);font-size:9.5px;color:var(--text)">${b.status === 'pledged' ? '<span style="color:var(--gold)">PLEDGED</span>' : '<span style="color:var(--green)">ALLOCATED</span>'}</td>
        <td style="padding:10px;font-family:var(--serifKr);font-size:13px;color:var(--sub)">${esc(b.custodian || '—')}</td>
        <td style="padding:10px;text-align:right"><button class="btn-tiny" data-action="bar-remove" data-serial="${esc(b.serial)}">REMOVE</button></td>
      </tr>`;
    }
    rows += `</tbody></table>`;
  }

  const totalLine = `<div class="flow-meta" style="margin-bottom:12px">
    <span>Total assigned: <strong style="color:var(--goldB);font-family:var(--mono)">${totalKg.toFixed(2)} kg</strong></span>
    ${expectedKg > 0 ? `<span>Committed: ${expectedKg.toFixed(2)} kg</span>` : ''}
    ${remaining > 0 ? `<span class="warn">Remaining to assign: ${remaining.toFixed(2)} kg</span>` : (expectedKg > 0 ? '<span class="ok">✓ Fully assigned</span>' : '')}
  </div>`;

  // Add-bar form
  const form = `<div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--goldD);margin-bottom:10px;text-transform:uppercase">Assign new bar</div>
    <div style="display:grid;grid-template-columns:1.5fr 0.7fr 1fr 1.5fr auto;gap:10px;align-items:end">
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Serial</div>
        <input id="bar-serial" type="text" placeholder="PM-8847" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;letter-spacing:0.10em">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">KG</div>
        <input id="bar-kg" type="number" step="0.001" placeholder="1.000" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Status</div>
        <select id="bar-status" style="width:100%;padding:8px 10px;background:#0f0d0a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
          <option value="allocated">ALLOCATED</option>
          <option value="pledged">PLEDGED</option>
        </select>
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Custodian</div>
        <input id="bar-custodian" type="text" placeholder="Singapore Freeport" value="Singapore Freeport" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--serifKr);font-size:13px">
      </div>
      <button class="btn-big" data-action="bar-add">ASSIGN  →</button>
    </div>
  </div>`;

  return `<div class="flow-panel ${bars.length ? (remaining > 0 ? 'f-active' : 'f-done') : 'f-active'}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${bars.length ? (remaining > 0 ? 'PARTIAL ASSIGNMENT' : 'FULLY ASSIGNED') : 'AWAITING ASSIGNMENT'}</div>
        <div class="flow-msg">${bars.length} ${bars.length === 1 ? 'bar' : 'bars'} on file</div>
      </div>
    </div>
    ${totalLine}
    ${rows}
    ${form}
  </div>`;
}

// ── LTV panel — manage drawn / ceiling / facility ─────────────────────
function renderLtvPanel(l) {
  if (!l.wire || !l.wire.cleared_at) {
    return `<div class="flow-panel f-empty">LTV management activates after wire clears.</div>`;
  }
  const ltv = l.ltv || { drawn_krw: 0, ceiling_pct: (l.ioi && l.ioi.ltv_pct) || 65, margin_pct: 80, facility_id: '' };
  const totalKg = (l.bars || []).reduce((s, b) => s + (b.kg || 0), 0) || (l.ioi && l.ioi.kg) || 0;
  // Approximate gold value at 471M/kg fallback (real spot fetched on member side)
  const goldValueApprox = totalKg * 471_000_000;
  const ceilingKrw = goldValueApprox * (ltv.ceiling_pct / 100);
  const deployable = Math.max(0, ceilingKrw - (ltv.drawn_krw || 0));

  return `<div class="flow-panel f-active">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">CREDIT FACILITY</div>
        <div class="flow-msg">${fmtKrw(ltv.drawn_krw || 0)} drawn against a ${ltv.ceiling_pct}% ceiling</div>
        <div class="flow-meta">
          ${ltv.facility_id ? `Facility ID: <span style="font-family:var(--mono);color:var(--text)">${esc(ltv.facility_id)}</span>` : '<span class="warn">No facility ID</span>'}
          ${ltv.updated_at ? `<span>Updated ${esc(fmtDate(ltv.updated_at))}</span>` : ''}
        </div>
      </div>
    </div>

    <div class="ioi-facts" style="margin-top:14px">
      <div class="ioi-fact"><div class="lbl">Drawn</div><div class="val gold">${fmtKrw(ltv.drawn_krw || 0)}</div></div>
      <div class="ioi-fact"><div class="lbl">Ceiling (${ltv.ceiling_pct}%)</div><div class="val">${fmtKrw(ceilingKrw)}</div><div class="sub">on ${totalKg.toFixed(2)} kg @ approx</div></div>
      <div class="ioi-fact"><div class="lbl">Deployable</div><div class="val">${fmtKrw(deployable)}</div></div>
      <div class="ioi-fact"><div class="lbl">Margin %</div><div class="val">${ltv.margin_pct}%</div></div>
    </div>

    <div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--goldD);margin-bottom:10px;text-transform:uppercase">Update credit facility</div>
      <div style="display:grid;grid-template-columns:1.4fr 0.7fr 0.7fr 1.2fr auto;gap:10px;align-items:end">
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Drawn (KRW)</div>
          <input id="ltv-drawn-input" type="number" step="1000000" placeholder="0" value="${ltv.drawn_krw || ''}" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Ceiling %</div>
          <input id="ltv-ceiling-input" type="number" step="1" min="0" max="100" value="${ltv.ceiling_pct || 65}" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Margin %</div>
          <input id="ltv-margin-input" type="number" step="1" min="0" max="100" value="${ltv.margin_pct || 80}" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Facility ID</div>
          <input id="ltv-facility-input" type="text" placeholder="SC-XXXXX" value="${esc(ltv.facility_id || '')}" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
        </div>
        <button class="btn-big" data-action="ltv-set">SAVE  →</button>
      </div>
    </div>
  </div>`;
}

// ── Documents panel — link member-facing PDFs (URL-based for v1) ──────
function renderDocsPanel(l) {
  if (!l.wire || !l.wire.cleared_at) {
    return `<div class="flow-panel f-empty">Document panel activates after wire clears.</div>`;
  }
  const docs = l.docs || [];

  let rows = '';
  if (docs.length) {
    rows = `<table style="width:100%;border-collapse:collapse;margin:12px 0">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Kind</th>
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Label</th>
          <th style="text-align:left;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Issued</th>
          <th style="text-align:right;padding:8px 10px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Action</th>
        </tr>
      </thead>
      <tbody>`;
    for (const d of docs) {
      rows += `<tr style="border-bottom:1px dashed var(--rule)">
        <td style="padding:10px;font-family:var(--mono);font-size:9.5px;color:var(--gold);letter-spacing:0.16em;text-transform:uppercase">${esc(d.kind)}</td>
        <td style="padding:10px;font-family:var(--serifKr);font-size:13px;color:var(--text)"><a href="${esc(d.url)}" target="_blank" rel="noopener" style="color:var(--text)">${esc(d.label)} ↗</a>${d.version ? ` <span style="color:var(--muted);font-family:var(--mono);font-size:10px">v${esc(d.version)}</span>` : ''}</td>
        <td style="padding:10px;font-family:var(--mono);font-size:10px;color:var(--muted)">${d.issued_at ? esc(fmtDate(d.issued_at)) : '—'}</td>
        <td style="padding:10px;text-align:right"><button class="btn-tiny" data-action="doc-remove" data-doc-id="${esc(d.id)}">REMOVE</button></td>
      </tr>`;
    }
    rows += `</tbody></table>`;
  } else {
    rows = '<div class="empty" style="padding:24px;text-align:center;font-style:italic;color:var(--muted)">No documents added yet.</div>';
  }

  const form = `<div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--goldD);margin-bottom:10px;text-transform:uppercase">Add document</div>

    <!-- Mode toggle: upload | url -->
    <div style="display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);width:fit-content">
      <button type="button" id="doc-mode-upload" class="btn-tab active" data-mode-toggle="upload">UPLOAD FILE</button>
      <button type="button" id="doc-mode-url" class="btn-tab" data-mode-toggle="url">PASTE URL</button>
    </div>

    <div style="display:grid;grid-template-columns:auto 1.5fr 0.6fr;gap:10px;align-items:end;margin-bottom:10px">
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Kind</div>
        <select id="doc-kind" style="padding:8px 10px;background:#0f0d0a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px">
          <option value="subscription">SUBSCRIPTION</option>
          <option value="bar_cert">BAR CERTIFICATE</option>
          <option value="ppm">PPM</option>
          <option value="k1">K-1 EQUIVALENT</option>
          <option value="audit">AUDIT</option>
          <option value="lp_letter">LP LETTER</option>
          <option value="capital_call">CAPITAL CALL</option>
          <option value="quarterly_statement">QUARTERLY STATEMENT</option>
          <option value="tax">TAX</option>
          <option value="other">OTHER</option>
        </select>
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Label</div>
        <input id="doc-label" type="text" placeholder="Subscription Agreement · 2026-Q3" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--serifKr);font-size:13px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Version</div>
        <input id="doc-version" type="text" placeholder="2026-04" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px">
      </div>
    </div>

    <!-- Upload-mode: file picker -->
    <div id="doc-mode-upload-pane">
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end">
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">File  ·  PDF / JPG / PNG  ·  max 4 MB</div>
          <input id="doc-file" type="file" accept="application/pdf,image/jpeg,image/jpg,image/png" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px">
        </div>
        <button class="btn-big" data-action="doc-upload">UPLOAD  →</button>
      </div>
      <div style="margin-top:8px;font-family:var(--serifKr);font-style:italic;font-size:11px;color:var(--muted);line-height:1.5">
        File is stored privately. Members access through their portfolio (cookie-gated).
      </div>
    </div>

    <!-- URL-mode: paste link -->
    <div id="doc-mode-url-pane" style="display:none">
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end">
        <div>
          <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">URL  ·  must be https://</div>
          <input id="doc-url" type="url" placeholder="https://..." style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:0.04em">
        </div>
        <button class="btn-big" data-action="doc-add">ADD  →</button>
      </div>
      <div style="margin-top:8px;font-family:var(--serifKr);font-style:italic;font-size:11px;color:var(--muted);line-height:1.5">
        Use this if the file is already hosted elsewhere. Member will fetch directly from the URL.
      </div>
    </div>
  </div>`;

  return `<div class="flow-panel ${docs.length ? 'f-active' : 'f-pending'}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${docs.length} DOCUMENT${docs.length === 1 ? '' : 'S'}</div>
        <div class="flow-msg">${docs.length ? 'On file for this member' : 'No documents added yet'}</div>
      </div>
    </div>
    ${rows}
    ${form}
  </div>`;
}

// ── Positions panel (Phase 3) — manage portfolio positions ────────────
function renderPositionsPanel(l) {
  if (!l.wire || !l.wire.cleared_at) {
    return `<div class="flow-panel f-empty">Positions activate after wire clears (Phase 3 — first deployments expected Q4 2026).</div>`;
  }
  const positions = l.positions || [];

  let rows = '';
  if (positions.length) {
    rows = `<table style="width:100%;border-collapse:collapse;margin:12px 0">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Code</th>
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Tags</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Committed</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Drawn</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Marked</th>
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Status</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Action</th>
        </tr>
      </thead>
      <tbody>`;
    for (const p of positions) {
      const tags = [p.sector, p.stage, p.type !== 'other' ? p.type : null].filter(Boolean).join(' · ');
      rows += `<tr style="border-bottom:1px dashed var(--rule)">
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--goldB);letter-spacing:0.10em;font-weight:500">${esc(p.code)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase">${esc(tags)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--text);text-align:right">${fmtKrw(p.committed_krw)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--text);text-align:right">${fmtKrw(p.drawn_krw)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;text-align:right;${p.marked_krw > p.committed_krw ? 'color:var(--green)' : (p.marked_krw < p.committed_krw ? 'color:var(--red)' : 'color:var(--text)')}">${fmtKrw(p.marked_krw)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase">${p.status === 'active' ? '<span style="color:var(--green)">ACTIVE</span>' : p.status === 'realized' ? '<span style="color:var(--gold)">REALIZED</span>' : '<span style="color:var(--red)">WRITTEN OFF</span>'}</td>
        <td style="padding:10px 8px;text-align:right">
          <button class="btn-tiny" data-action="position-update-prompt" data-pos-id="${esc(p.id)}" data-drawn="${p.drawn_krw}" data-marked="${p.marked_krw}">EDIT</button>
          <button class="btn-tiny" data-action="position-remove" data-pos-id="${esc(p.id)}">REMOVE</button>
        </td>
      </tr>`;
    }
    rows += `</tbody></table>`;
  } else {
    rows = '<div class="empty" style="padding:24px;text-align:center;font-style:italic;color:var(--muted)">No positions deployed yet.</div>';
  }

  // Aggregates
  const totalCommitted = positions.reduce((s, p) => s + (p.committed_krw || 0), 0);
  const totalDrawn = positions.reduce((s, p) => s + (p.drawn_krw || 0), 0);
  const totalMarked = positions.reduce((s, p) => s + (p.marked_krw || 0), 0);

  const aggLine = positions.length ? `<div class="ioi-facts" style="margin:12px 0">
    <div class="ioi-fact"><div class="lbl">Committed</div><div class="val gold">${fmtKrw(totalCommitted)}</div></div>
    <div class="ioi-fact"><div class="lbl">Drawn</div><div class="val">${fmtKrw(totalDrawn)}</div></div>
    <div class="ioi-fact"><div class="lbl">Marked</div><div class="val">${fmtKrw(totalMarked)}</div></div>
  </div>` : '';

  // Add-position form
  const form = `<div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--goldD);margin-bottom:10px;text-transform:uppercase">Deploy new position</div>
    <div style="display:grid;grid-template-columns:0.7fr 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:10px">
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Code</div>
        <input id="pos-code" type="text" placeholder="E3" maxlength="16" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;letter-spacing:0.10em;text-transform:uppercase">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Sector</div>
        <input id="pos-sector" type="text" placeholder="AI · FinTech · ..." style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--serifKr);font-size:13px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Stage</div>
        <input id="pos-stage" type="text" placeholder="Series D · ..." style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--serifKr);font-size:13px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Type</div>
        <select id="pos-type" style="padding:8px 10px;background:#0f0d0a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px">
          <option value="venture">VENTURE</option>
          <option value="equity">EQUITY</option>
          <option value="private_credit">PRIVATE CREDIT</option>
          <option value="real_estate">REAL ESTATE</option>
          <option value="other">OTHER</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end">
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Committed (KRW)</div>
        <input id="pos-committed" type="number" step="1000000" placeholder="100000000" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Drawn (KRW)</div>
        <input id="pos-drawn" type="number" step="1000000" placeholder="0" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
      </div>
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Marked (KRW)</div>
        <input id="pos-marked" type="number" step="1000000" placeholder="0" style="width:100%;padding:8px 10px;background:rgba(0,0,0,0.30);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px">
      </div>
      <button class="btn-big" data-action="position-add">DEPLOY  →</button>
    </div>
  </div>`;

  return `<div class="flow-panel ${positions.length ? 'f-active' : 'f-pending'}">
    <div class="flow-row">
      <span class="flow-pip"></span>
      <div class="flow-body">
        <div class="flow-head">${positions.length} ACTIVE POSITION${positions.length === 1 ? '' : 'S'}</div>
        <div class="flow-msg">${positions.length ? `${fmtKrw(totalDrawn)} deployed across ${positions.length} ${positions.length === 1 ? 'position' : 'positions'}` : 'Phase 3 — first deployments Q4 2026'}</div>
      </div>
    </div>
    ${aggLine}
    ${rows}
    ${form}
  </div>`;
}

// ── Capital Calls panel (Phase 3 follow-on) ───────────────────────────
function renderCapitalCallsPanel(l) {
  if (!l.wire || !l.wire.cleared_at) {
    return `<div class="flow-panel f-empty">Capital calls activate after wire clears (and after at least one position is deployed).</div>`;
  }
  const calls = l.capital_calls || [];
  const positions = l.positions || [];

  let rows = '';
  if (calls.length) {
    rows = `<table style="width:100%;border-collapse:collapse;margin:12px 0">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">#</th>
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Position</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Amount</th>
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Due</th>
          <th style="text-align:left;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Status</th>
          <th style="text-align:right;padding:8px;font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--goldD)">Action</th>
        </tr>
      </thead>
      <tbody>`;
    // Newest first
    const sorted = calls.slice().sort((a, b) => (b.created_at || 0) - (a.created_at || 0));
    for (const cc of sorted) {
      const statusColor = cc.status === 'paid' ? 'var(--green)' : (cc.status === 'acknowledged' ? 'var(--gold)' : 'var(--red)');
      const due = cc.response_by ? new Date(cc.response_by).toISOString().slice(0, 10) : '—';
      rows += `<tr style="border-bottom:1px dashed var(--rule)">
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--text)">#${cc.number}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--goldB);letter-spacing:0.10em">${esc(cc.position_code || '—')}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:11px;color:var(--text);text-align:right">${fmtKrw(cc.amount_krw)}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:10px;color:var(--muted)">${due}</td>
        <td style="padding:10px 8px;font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:${statusColor}">${cc.status.toUpperCase()}</td>
        <td style="padding:10px 8px;text-align:right">
          ${cc.status !== 'paid' ? `<button class="btn-tiny" data-action="cc-mark-paid" data-cc-id="${esc(cc.id)}">MARK PAID</button>` : ''}
          <button class="btn-tiny" data-action="cc-remove" data-cc-id="${esc(cc.id)}">REMOVE</button>
        </td>
      </tr>`;
    }
    rows += `</tbody></table>`;
  } else {
    rows = '<div class="empty" style="padding:24px;text-align:center;font-style:italic;color:var(--muted)">No capital calls issued yet.</div>';
  }

  // Position selector
  const posOptions = positions.length
    ? positions.map((p) => `<option value="${esc(p.code)}">${esc(p.code)} · ${esc(p.sector || p.type)}</option>`).join('')
    : '<option value="">— deploy positions first —</option>';

  const form = `<div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.28em;color:var(--goldD);margin-bottom:10px;text-transform:uppercase">Issue capital call</div>
    <div style="display:grid;grid-template-columns:0.8fr 1fr 1fr auto;gap:10px;align-items:end">
      <div>
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--muted);margin-bottom:4px">Position</div>

// ── KRW formatter for dashboard (always 억/만 per round-2 directive) ──
function fmtKrw(amount) {
  if (amount == null || isNaN(amount)) return '—';
  const a = Math.round(amount);
  if (a === 0) return '0';
  const EOK = 100_000_000, MAN = 10_000;
  const eok = Math.floor(a / EOK);
  const remainder = a % EOK;
  const man = Math.floor(remainder / MAN);
  const won = remainder % MAN;
  const parts = [];
  if (eok) parts.push(eok.toLocaleString('en-US') + '억');
  if (man) parts.push(man.toLocaleString('en-US') + '만');
  if (won) parts.push(won.toLocaleString('en-US') + '원');
  return parts.join(' ') || '0';
}

function renderNdaArchive(l, archive) {

    return `
