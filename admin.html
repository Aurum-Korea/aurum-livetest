<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<title>Partners Console · Aurum</title>
<meta name="description" content="Private partners console.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg-2:#0c0c0c;--card:#0f0d0a;--card-2:#131210;--card-3:#191613;
  --text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;--dim:#3a3733;
  --gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;--goldDeep:#6a5a3a;
  --goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);
  --goldWash:rgba(197,165,114,0.04);--goldWashS:rgba(197,165,114,0.10);
  --goldGlow:rgba(197,165,114,0.20);--border:rgba(255,255,255,0.08);
  --red:#c77061;--redWash:rgba(199,112,97,0.08);--redBorder:rgba(199,112,97,0.40);
  --green:#7aa885;--greenWash:rgba(122,168,133,0.08);--greenBorder:rgba(122,168,133,0.40);
  --blue:#7e93b8;--blueWash:rgba(126,147,184,0.08);--blueBorder:rgba(126,147,184,0.40);
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --serifKr:'Noto Serif KR','Cormorant Garamond',Georgia,serif;
  --sans:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --pad-x:clamp(20px,4vw,56px);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;min-height:100vh;min-width:320px}
a{color:inherit;text-decoration:none}em{font-style:italic}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;color:inherit}
::selection{background:rgba(197,165,114,0.30);color:var(--text)}

/* ── ambient ── */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 1200px 700px at 50% -10%,rgba(197,165,114,0.05),transparent 70%)}

/* ═══ LOGIN ═══ */
.login{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px var(--pad-x)}
.login-card{width:100%;max-width:380px;text-align:center}
.login-seal{width:56px;height:56px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:26px;letter-spacing:-0.04em;margin-bottom:22px;box-shadow:0 0 28px var(--goldGlow)}
.login-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:0.36em;color:var(--gold);margin-bottom:12px}
.login-title{font-family:var(--serif);font-weight:500;font-size:36px;line-height:1.1;letter-spacing:-0.01em;margin:0 0 6px}
.login-title em{font-style:italic;color:var(--gold)}
.login-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14.5px;margin:0 0 36px}
.login-form{display:flex;flex-direction:column;gap:18px}
.login-input{width:100%;padding:14px 0;background:transparent;border:0;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:18px;outline:none;text-align:center;letter-spacing:0.05em;transition:border-color .3s,box-shadow .3s}
.login-input:focus{border-bottom-color:var(--gold);box-shadow:0 1px 0 0 var(--gold)}
.login-input.error{border-bottom-color:var(--red)}
.login-btn{padding:16px 24px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:0.30em;text-transform:uppercase;border:1px solid var(--gold);background:var(--gold);color:var(--bg);transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:10px}
.login-btn:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB);box-shadow:0 8px 28px rgba(227,193,135,0.30)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-style:italic;font-size:13px;margin-top:6px;min-height:1.2em}
.login-foot{margin-top:48px;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--dim)}

/* ═══ APP ═══ */
.app{display:none;position:relative;z-index:1;min-height:100vh}
.app.show{display:block}

/* nav */
.nav{position:sticky;top:0;z-index:10;padding:14px var(--pad-x);background:rgba(10,10,10,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:16px}
.nav-l{display:flex;align-items:center;gap:14px;min-width:0}
.nav-seal{width:30px;height:30px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:14px;letter-spacing:-0.04em;flex-shrink:0}
.nav-text{display:flex;flex-direction:column;line-height:1;min-width:0}
.nav-text .word{font-family:var(--sans);font-weight:600;font-size:12.5px;letter-spacing:0.32em;color:var(--text);white-space:nowrap}
.nav-text .sub{font-family:var(--mono);font-weight:400;font-size:8px;letter-spacing:0.36em;color:var(--goldD);margin-top:4px}
.nav-r{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}
.partner-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:0.28em;color:var(--goldB);padding:6px 11px;border:1px solid var(--goldBorder);background:var(--goldWash)}
.btn-ghost{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--sub);padding:7px 13px;border:1px solid var(--border);background:transparent;transition:all .2s}
.btn-ghost:hover{color:var(--goldB);border-color:var(--goldBorderS);background:var(--goldWash)}
.btn-gold{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--bg);padding:7px 13px;border:1px solid var(--gold);background:var(--gold);transition:all .2s}
.btn-gold:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{font-family:var(--mono);font-size:10px;letter-spacing:0.26em;color:var(--red);padding:7px 13px;border:1px solid var(--redBorder);background:var(--redWash);transition:all .2s}
.btn-danger:hover{color:var(--red);background:rgba(199,112,97,0.16)}

/* stats strip */
.stats{padding:22px var(--pad-x);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0;background:var(--bg-2)}
.stat{padding:0 22px;border-left:1px solid var(--border)}
.stat:first-child{border-left:0;padding-left:0}
.stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldD);margin-bottom:6px}
.stat-val{font-family:var(--serif);font-style:italic;font-size:30px;font-weight:500;line-height:1;color:var(--goldB);letter-spacing:-0.01em}
.stat-val .x{color:var(--muted);font-size:18px;font-style:normal;letter-spacing:0;margin-left:4px}
.stat-row{font-family:var(--mono);font-size:9px;letter-spacing:0.20em;color:var(--sub);margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.stat-row .pip{color:var(--goldD)}

/* main grid */
.main{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1.45fr);gap:0;min-height:calc(100vh - 70px - 110px)}
@media (max-width:960px){.main{grid-template-columns:1fr}}

/* list pane */
.pane-list{border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0}
.list-head{padding:18px var(--pad-x) 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px;background:var(--bg-2)}
.list-row1{display:flex;align-items:center;justify-content:space-between;gap:12px}
.list-title{font-family:var(--mono);font-size:10.5px;letter-spacing:0.32em;color:var(--goldB)}
.list-count{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:13px}
.search{position:relative}
.search input{width:100%;padding:11px 14px 11px 32px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:14px;outline:none;transition:border-color .2s,background .2s}
.search input:focus{border-color:var(--goldBorder);background:var(--card-2)}
.search input::placeholder{color:var(--muted);font-style:italic}
.search::before{content:'';position:absolute;left:11px;top:50%;width:13px;height:13px;margin-top:-7px;border:1.2px solid var(--goldD);border-radius:50%;pointer-events:none}
.search::after{content:'';position:absolute;left:21px;top:21px;width:7px;height:1.2px;background:var(--goldD);transform:rotate(45deg);pointer-events:none}

.filters{display:flex;flex-wrap:wrap;gap:6px}
.filter-chip{font-family:var(--mono);font-size:9px;letter-spacing:0.24em;padding:6px 10px;border:1px solid var(--border);background:transparent;color:var(--sub);transition:all .2s}
.filter-chip:hover{border-color:var(--goldBorder);color:var(--text)}
.filter-chip.on{border-color:var(--gold);background:var(--goldWash);color:var(--goldB)}
.filter-chip .n{color:var(--goldD);margin-left:6px;font-weight:400}
.filter-chip.on .n{color:var(--gold)}

.list{flex:1;overflow-y:auto;max-height:calc(100vh - 70px - 110px - 132px)}
@media (max-width:960px){.list{max-height:none}}
.lead-row{padding:16px var(--pad-x);border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;transition:background .2s}
.lead-row:hover{background:var(--card)}
.lead-row.sel{background:var(--card-2);box-shadow:inset 3px 0 0 var(--gold)}
.lead-status{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.lead-status.s-new{background:var(--gold);box-shadow:0 0 10px var(--goldGlow)}
.lead-status.s-reviewing{background:var(--blue)}
.lead-status.s-approved{background:var(--green);box-shadow:0 0 10px rgba(122,168,133,0.4)}
.lead-status.s-sent{background:var(--green);opacity:.6}
.lead-status.s-declined{background:var(--red);opacity:.5}
.lead-mid{min-width:0}
.lead-name{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--text);line-height:1.2;letter-spacing:-0.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-name .ko{font-family:var(--serifKr);color:var(--goldD);font-weight:300;font-size:14px;margin-left:8px}
.lead-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:0.18em;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.lead-meta .tier{color:var(--goldB)}
.lead-meta .country{color:var(--sub)}
.lead-meta .sep{color:var(--dim)}
.lead-time{font-family:var(--mono);font-size:9.5px;letter-spacing:0.16em;color:var(--muted);text-align:right;flex-shrink:0;margin-top:4px}
.empty{padding:60px 32px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--serif);font-size:15px}

/* detail pane */
.pane-detail{display:flex;flex-direction:column;min-width:0;background:var(--bg-2)}
.detail-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 32px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--serif);font-size:16px}
.detail-empty .seal{display:inline-block;width:36px;height:36px;border:1px solid var(--goldBorder);font-family:var(--serif);font-style:italic;color:var(--goldD);font-size:18px;line-height:34px;letter-spacing:-0.04em;margin-bottom:16px}

.detail{padding:28px var(--pad-x) 60px;max-width:780px}
.det-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.32em;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.det-eyebrow .id{color:var(--muted);font-size:9px}
.det-name{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.05;letter-spacing:-0.015em;color:var(--text);margin:0 0 6px}
.det-name em{font-style:italic;color:var(--gold)}
.det-name .ko{display:inline-block;font-family:var(--serifKr);font-weight:300;color:var(--goldD);font-size:24px;margin-left:14px;letter-spacing:0}
.det-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:15.5px;margin:0 0 28px}

.status-bar{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 28px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.status-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:0.26em;padding:8px 12px;border:1px solid var(--border);background:transparent;color:var(--sub);transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.status-pill:hover{border-color:var(--goldBorder);color:var(--text)}
.status-pill.on.new{border-color:var(--gold);color:var(--gold);background:var(--goldWash)}
.status-pill.on.reviewing{border-color:var(--blueBorder);color:var(--blue);background:var(--blueWash)}
.status-pill.on.approved,.status-pill.on.sent{border-color:var(--greenBorder);color:var(--green);background:var(--greenWash)}
.status-pill.on.declined{border-color:var(--redBorder);color:var(--red);background:var(--redWash)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* facts */
.facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;border:1px solid var(--border);background:var(--card);margin:0 0 28px}
.fact{padding:16px 20px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.fact:last-child{border-right:0}
@media (max-width:680px){.fact{border-right:0}}
.fact-lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldD);margin-bottom:6px}
.fact-val{font-family:var(--serif);font-size:15.5px;color:var(--text);font-weight:400;word-break:break-word}
.fact-val a{color:var(--goldB);border-bottom:1px solid var(--goldBorder);transition:border-color .2s}
.fact-val a:hover{border-bottom-color:var(--gold)}
.fact-val em{font-style:italic;color:var(--goldB)}

/* note from patron */
.note-block{padding:18px 22px;border:1px solid var(--goldBorder);border-left:2px solid var(--gold);background:var(--card);margin:0 0 28px;font-family:var(--serif);font-style:italic;font-size:15.5px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.note-block .lbl{display:block;font-style:normal;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--gold);margin-bottom:10px}

/* sections */
.section{margin:0 0 28px}
.sec-h{font-family:var(--mono);font-size:10px;letter-spacing:0.32em;color:var(--gold);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.sec-h::after{content:'';flex:1;height:1px;background:var(--goldBorder)}

/* approve panel */
.approve-panel{padding:22px;border:1px solid var(--goldBorder);background:linear-gradient(180deg,var(--goldWash),transparent);margin:0 0 28px}
.approve-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.code-box{flex:1;min-width:200px;padding:14px 18px;background:var(--bg);border:1px solid var(--goldBorderS);font-family:var(--mono);font-size:16px;letter-spacing:0.18em;color:var(--goldB);text-align:center}
.code-box.empty{color:var(--muted);font-style:italic;font-size:13px;letter-spacing:0.04em;font-family:var(--serif)}
.btn-big{padding:13px 22px;font-family:var(--mono);font-size:11px;letter-spacing:0.28em;border:1px solid var(--gold);background:var(--gold);color:var(--bg);transition:all .2s;display:inline-flex;align-items:center;gap:9px;white-space:nowrap}
.btn-big:hover:not(:disabled){background:var(--goldB);box-shadow:0 6px 24px rgba(227,193,135,0.3)}
.btn-big:disabled{opacity:.4;cursor:not-allowed}
.btn-big.outline{background:transparent;color:var(--gold)}
.btn-big.outline:hover:not(:disabled){background:var(--goldWashS)}
.approve-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:0.22em;color:var(--muted);margin-top:14px;display:flex;flex-wrap:wrap;gap:12px}
.approve-meta .ok{color:var(--green)}
.approve-meta .warn{color:var(--gold)}
.approve-meta .err{color:var(--red)}

/* NDA panel */
.nda-panel{padding:22px;border:1px solid var(--border);background:var(--card);margin:0 0 28px}
.nda-panel.nda-inactive{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14px;text-align:center;padding:18px}
.nda-panel.nda-awaiting{border-color:var(--goldBorder);background:linear-gradient(180deg,rgba(197,165,114,0.03),transparent)}
.nda-panel.nda-uploaded{border-color:var(--goldBorderS);background:linear-gradient(180deg,var(--goldWash),transparent)}
.nda-panel.nda-approved{border-color:rgba(122,168,133,0.35);background:linear-gradient(180deg,rgba(122,168,133,0.04),transparent)}
.nda-panel.nda-rejected{border-color:rgba(199,112,97,0.40);background:linear-gradient(180deg,rgba(199,112,97,0.04),transparent)}
.nda-row{display:flex;gap:14px;align-items:flex-start}
.nda-pip{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-top:5px;flex-shrink:0}
.nda-panel.nda-awaiting .nda-pip{background:var(--goldD)}
.nda-panel.nda-uploaded .nda-pip{background:var(--gold);box-shadow:0 0 8px var(--goldGlow)}
.nda-panel.nda-approved .nda-pip{background:var(--green);box-shadow:0 0 8px rgba(122,168,133,0.4)}
.nda-panel.nda-rejected .nda-pip{background:var(--red)}
.nda-body{flex:1;min-width:0}
.nda-head{font-family:var(--mono);font-size:9.5px;letter-spacing:0.30em;text-transform:uppercase;margin-bottom:6px;color:var(--muted)}
.nda-panel.nda-awaiting .nda-head{color:var(--goldD)}
.nda-panel.nda-uploaded .nda-head{color:var(--gold)}
.nda-panel.nda-approved .nda-head{color:var(--green)}
.nda-panel.nda-rejected .nda-head{color:var(--red)}
.nda-msg{font-family:var(--serif);font-size:14.5px;line-height:1.6;color:var(--text);margin-bottom:6px}
.nda-meta{font-family:var(--mono);font-size:9.5px;letter-spacing:0.22em;color:var(--muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:12px}
.nda-meta .ok{color:var(--green)}
.nda-meta .err{color:var(--red)}
.nda-reason{margin-top:10px;padding:10px 12px;background:rgba(199,112,97,0.06);border-left:2px solid var(--red);font-family:var(--serif);font-size:13.5px;color:var(--text)}
.nda-reason em{color:var(--red);font-style:italic}
.nda-actions{margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.nda-meta-pill{font-family:var(--mono);font-size:9.5px;letter-spacing:0.22em;padding:4px 10px;border:1px solid var(--border)}
.nda-meta-pill.warn{color:var(--gold);border-color:var(--goldBorder)}
.btn-big-danger{padding:13px 22px;font-family:var(--mono);font-size:11px;letter-spacing:0.28em;border:1px solid var(--red);background:transparent;color:var(--red);transition:all .2s;display:inline-flex;align-items:center;gap:9px;white-space:nowrap;cursor:pointer}
.btn-big-danger:hover{background:rgba(199,112,97,0.10)}

.nda-tag{font-family:var(--mono);font-size:9px;letter-spacing:0.20em;padding:1px 6px;border:1px solid var(--border);text-transform:uppercase}
.nda-tag.rev{color:var(--gold);border-color:var(--goldBorder);background:var(--goldWash)}
.nda-tag.ok{color:var(--green);border-color:rgba(122,168,133,0.30);background:rgba(122,168,133,0.06)}
.nda-tag.err{color:var(--red);border-color:rgba(199,112,97,0.30);background:rgba(199,112,97,0.06)}

/* NDA archive list — historical/superseded uploads */
.nda-archive-block{margin-top:10px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-left:2px solid var(--goldDeep)}
.nda-archive-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.nda-archive-head .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:0.28em;color:var(--goldD);text-transform:uppercase}
.nda-archive-head .hint{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--muted)}
.nda-archive-list{display:flex;flex-direction:column;gap:8px}
.nda-arch-row{display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,0.05);font-family:var(--mono);font-size:11px}
.nda-arch-row:last-child{border-bottom:0}
.nda-arch-meta{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.nda-arch-num{color:var(--goldDeep);font-size:9.5px;letter-spacing:0.20em;flex-shrink:0;width:24px}
.nda-arch-name{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.nda-arch-size{color:var(--muted);font-size:9.5px;flex-shrink:0}
.nda-arch-when{color:var(--muted);font-size:9.5px;letter-spacing:0.10em;flex-shrink:0}
.nda-arch-when .ok{color:var(--green)}
.nda-arch-when .err{color:var(--red)}
.nda-arch-when em{font-style:italic;font-family:var(--serif);font-size:11px}
.btn-tiny{font-family:var(--mono);font-size:9px;letter-spacing:0.24em;padding:4px 9px;border:1px solid var(--goldBorder);background:transparent;color:var(--goldD);cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-tiny:hover{color:var(--goldB);border-color:var(--goldBorderS);background:var(--goldWash)}
@media(max-width:720px){
  .nda-arch-row{flex-wrap:wrap}
  .nda-arch-when{width:100%;padding-left:34px}
}

/* notes */
.notes-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.note-item{padding:13px 16px;background:var(--card);border-left:2px solid var(--goldBorder);font-family:var(--serif);font-size:14.5px;line-height:1.6;color:var(--text);white-space:pre-wrap}
.note-foot{font-family:var(--mono);font-size:9px;letter-spacing:0.24em;color:var(--muted);margin-top:8px;font-style:normal}
.notes-empty{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:13.5px;margin:0 0 14px}
.note-form{display:flex;flex-direction:column;gap:10px}
.note-form textarea{width:100%;min-height:72px;padding:12px 14px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:14.5px;line-height:1.6;outline:none;resize:vertical;transition:border-color .2s}
.note-form textarea:focus{border-color:var(--goldBorder)}
.note-form .row{display:flex;justify-content:flex-end}

/* audit */
.audit-list{display:flex;flex-direction:column}
.audit-item{padding:9px 0;border-bottom:1px dashed var(--border);font-family:var(--mono);font-size:10px;letter-spacing:0.10em;color:var(--sub);display:grid;grid-template-columns:120px 1fr auto;gap:14px;align-items:center}
.audit-item:last-child{border-bottom:0}
.audit-item .when{color:var(--muted);font-size:9px;letter-spacing:0.16em}
.audit-item .what{color:var(--text)}
.audit-item .who{color:var(--goldD);font-size:9px;letter-spacing:0.20em}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:100;padding:14px 22px;background:var(--card-2);border:1px solid var(--goldBorderS);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:0.22em;opacity:0;transition:all .3s var(--ease-out);box-shadow:0 12px 40px rgba(0,0,0,0.6);pointer-events:none;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--redBorder);color:var(--red)}
.toast.ok{border-color:var(--greenBorder);color:var(--green)}

/* preview modal */
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px}
.modal.show{display:flex}
.modal-card{max-width:640px;width:100%;max-height:88vh;overflow:auto;background:var(--card-2);border:1px solid var(--goldBorderS);padding:32px}
.modal-h{font-family:var(--mono);font-size:10px;letter-spacing:0.30em;color:var(--gold);margin-bottom:14px}
.modal-pre{font-family:var(--mono);font-size:11.5px;line-height:1.7;color:var(--sub);white-space:pre-wrap;background:var(--bg);padding:18px;border:1px solid var(--border);max-height:50vh;overflow:auto}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:1.6px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}

/* mobile */
@media (max-width:960px){
  .pane-detail.has-sel{display:flex}
  .pane-list.has-sel{display:none}
  .back-mob{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:0.28em;color:var(--gold);background:transparent;border:0;padding:0 0 14px;cursor:pointer}
}
.back-mob{display:none}
@media (max-width:960px){
  .pane-list.has-sel.show-list{display:flex}
  .pane-detail.show-list{display:none}
}
</style>
</head>
<body>
<div class="amb"></div>

<!-- ════════ LOADING GATE (shown until /api/me resolves) ════════ -->
<section class="login" id="login" style="display:flex">
  <div class="login-card">
    <div class="login-seal"><em>Au</em></div>
    <div class="login-eyebrow" style="opacity:.6">VERIFYING</div>
    <h1 class="login-title" style="font-size:32px">One moment.</h1>
    <p class="login-sub" id="gate-msg">Confirming session…</p>
    <div class="login-foot">TACC PTE LTD · CONFIDENTIAL</div>
  </div>
</section>

<!-- ════════ APP ════════ -->
<div class="app" id="app">
  <nav class="nav">
    <div class="nav-l">
      <span class="nav-seal"><em>Au</em></span>
      <div class="nav-text">
        <span class="word">PARTNERS CONSOLE</span>
        <span class="sub">아우럼 · 파트너 콘솔</span>
      </div>
    </div>
    <div class="nav-r">
      <span class="partner-pill" id="partner-pill">PARTNER —</span>
      <button class="btn-ghost" id="btn-refresh">↻ REFRESH</button>
      <button class="btn-ghost" id="btn-export-nda" title="Download a CSV manifest of all NDA uploads">↓ EXPORT NDAs</button>
      <button class="btn-ghost" id="btn-logout">LOG OUT</button>
    </div>
  </nav>

  <!-- stats -->
  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-lbl">TOTAL INQUIRIES</div>
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-row" id="s-total-row"></div>
    </div>
    <div class="stat">
      <div class="stat-lbl">LAST 24 HOURS</div>
      <div class="stat-val" id="s-24h">—</div>
      <div class="stat-row"><span class="pip" id="s-7d-row">—</span></div>
    </div>
    <div class="stat">
      <div class="stat-lbl">PIPELINE STATE</div>
      <div class="stat-val" id="s-pipeline">—</div>
      <div class="stat-row" id="s-status-row"></div>
    </div>
    <div class="stat">
      <div class="stat-lbl">BY TIER</div>
      <div class="stat-val" id="s-tier-top">—</div>
      <div class="stat-row" id="s-tier-row"></div>
    </div>
  </div>

  <!-- main -->
  <div class="main">
    <!-- LIST -->
    <section class="pane-list" id="pane-list">
      <div class="list-head">
        <div class="list-row1">
          <span class="list-title">INQUIRIES · 문의</span>
          <span class="list-count" id="list-count">—</span>
        </div>
        <div class="search">
          <input type="text" id="search" placeholder="Search name, email, country, code…" autocomplete="off">
        </div>
        <div class="filters" id="filters"></div>
      </div>
      <div class="list" id="list"></div>
    </section>

    <!-- DETAIL -->
    <section class="pane-detail" id="pane-detail">
      <div class="detail-empty" id="detail-empty">
        <div>
          <div class="seal"><em>Au</em></div>
          <div>Select an inquiry to review.</div>
        </div>
      </div>
      <div class="detail" id="detail" style="display:none"></div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- preview modal -->
<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-h" id="modal-h">EMAIL PREVIEW</div>
    <pre class="modal-pre" id="modal-body"></pre>
    <div class="modal-foot">
      <button class="btn-ghost" id="modal-copy">COPY</button>
      <button class="btn-gold" id="modal-close">CLOSE</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// AURUM PARTNERS CONSOLE
// ═══════════════════════════════════════════════════════════════════════════

const $  = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const TIER_LBL = {
  '500k_1m':'$500K – $1M · Emerging',
  '1m_5m':'$1M – $5M · Established',
  '5m_25m':'$5M – $25M · Senior',
  '25m_plus':'$25M+ · Principal',
};
const TIER_SHORT = {'500k_1m':'$500K–1M','1m_5m':'$1–5M','5m_25m':'$5–25M','25m_plus':'$25M+'};
const COUNTRY_LBL = {KR:'South Korea',SG:'Singapore',HK:'Hong Kong SAR',JP:'Japan',US:'United States',GB:'United Kingdom',AU:'Australia',CA:'Canada',CH:'Switzerland',AE:'UAE',OTHER:'Other'};
const STATUS_LBL = {new:'NEW',reviewing:'REVIEWING',approved:'APPROVED',sent:'SENT',declined:'DECLINED'};

let state = {
  userId: null,
  email: null,
  leads: [],
  stats: null,
  selected: null,
  filter: { status: 'all', tier: 'all', q: '' },
};

// ── toast ────────────────────────────────────────────────────────────────
function toast(msg, kind='') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── api ──────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials:'same-origin' };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  let j = null;
  try { j = await r.json(); } catch {}
  if (!r.ok) throw new Error((j && j.error) || ('HTTP ' + r.status));
  return j;
}

// ── session ──────────────────────────────────────────────────────────────
async function checkSession() {
  try {
    const j = await api('GET', '/api/me');
    state.userId = (j.id || '').toUpperCase() || null;
    state.email = j.email || null;
    showApp();
  } catch {
    redirectToLogin();
  }
}
function redirectToLogin() {
  // Preserve intent: send the user back to /admin after they sign in.
  var next = encodeURIComponent('/admin' + window.location.search + window.location.hash);
  window.location.replace('/members?next=' + next);
}
function showApp() {
  $('login').style.display = 'none';
  $('app').classList.add('show');
  var label = state.userId || (state.email ? state.email.split('@')[0].toUpperCase() : '—');
  $('partner-pill').textContent = label;
  $('partner-pill').title = state.email || '';
  load();
}

$('btn-logout').addEventListener('click', async () => {
  try { await api('POST', '/api/logout'); } catch {}
  state.userId = null; state.email = null; state.selected = null; state.leads = [];
  redirectToLogin();
});

$('btn-refresh').addEventListener('click', () => { load(); toast('REFRESHED', 'ok'); });

$('btn-export-nda').addEventListener('click', () => {
  // Triggers a CSV download — the browser handles the file naming via the
  // Content-Disposition header set by the endpoint.
  window.location.href = '/api/admin/nda-archive?format=csv';
  toast('NDA MANIFEST DOWNLOADING…', 'ok');
});

// ── load ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const j = await api('GET', '/api/admin/list');
    state.leads = j.leads || [];
    state.stats = j.stats || null;
    renderStats();
    renderFilters();
    renderList();
    if (state.selected) {
      const updated = state.leads.find((l) => l.id === state.selected.id);
      if (updated) { state.selected = updated; renderDetail(); }
    } else {
      // If URL has ?lead=ID, open it
      const u = new URL(location.href);
      const lid = u.searchParams.get('lead');
      if (lid) {
        const found = state.leads.find((l) => l.id === lid);
        if (found) selectLead(found);
      }
    }
  } catch (e) {
    if (String(e.message).includes('401') || String(e.message).toLowerCase().includes('unauth')) {
      showLogin();
    } else {
      toast('LOAD FAILED · ' + e.message, 'err');
    }
  }
}

// ── stats ────────────────────────────────────────────────────────────────
function renderStats() {
  const s = state.stats || {};
  $('s-total').textContent = s.total ?? 0;
  $('s-total-row').innerHTML = `<span class="pip">+${s.last_7d || 0} this week</span>`;
  $('s-24h').textContent = s.last_24h ?? 0;
  $('s-7d-row').textContent = (s.last_7d || 0) + ' over 7 days';
  const open = (s.new || 0) + (s.reviewing || 0);
  $('s-pipeline').innerHTML = `${open}<span class="x">/${s.total||0}</span>`;
  $('s-status-row').innerHTML =
    `<span class="pip">${s.new||0} new</span>` +
    `<span class="pip">${s.reviewing||0} reviewing</span>` +
    `<span class="pip">${(s.approved||0)+(s.sent||0)} approved</span>`;
  // top tier
  const tiers = s.by_tier || {};
  let topKey = null, topN = -1;
  for (const k of Object.keys(tiers)) if (tiers[k] > topN) { topN = tiers[k]; topKey = k; }
  $('s-tier-top').textContent = topKey ? TIER_SHORT[topKey] : '—';
  $('s-tier-row').innerHTML = Object.keys(TIER_SHORT).map((k) =>
    `<span class="pip">${TIER_SHORT[k]} <strong style="color:var(--goldB)">${tiers[k]||0}</strong></span>`
  ).join('');
}

// ── filters ──────────────────────────────────────────────────────────────
function renderFilters() {
  const s = state.stats || {};
  const items = [
    {k:'all', l:'ALL', n: s.total||0},
    {k:'new', l:'NEW', n: s.new||0},
    {k:'reviewing', l:'REVIEWING', n: s.reviewing||0},
    {k:'approved', l:'APPROVED', n: (s.approved||0)+(s.sent||0)},
    {k:'declined', l:'DECLINED', n: s.declined||0},
  ];
  $('filters').innerHTML = items.map((it) =>
    `<button class="filter-chip ${state.filter.status===it.k?'on':''}" data-status="${it.k}">${it.l} <span class="n">${it.n}</span></button>`
  ).join('');
  $('filters').querySelectorAll('.filter-chip').forEach((b) =>
    b.addEventListener('click', () => { state.filter.status = b.dataset.status; renderFilters(); renderList(); })
  );
}

$('search').addEventListener('input', (e) => { state.filter.q = e.target.value.trim().toLowerCase(); renderList(); });

// ── list ─────────────────────────────────────────────────────────────────
function filterLeads() {
  return state.leads.filter((l) => {
    if (state.filter.status !== 'all') {
      if (state.filter.status === 'approved') {
        if (l.status !== 'approved' && l.status !== 'sent') return false;
      } else if (l.status !== state.filter.status) return false;
    }
    if (state.filter.q) {
      const hay = [l.name, l.name_ko, l.email, l.country, l.code, l.referral, l.note].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(state.filter.q)) return false;
    }
    return true;
  });
}
function renderList() {
  const filtered = filterLeads();
  $('list-count').textContent = filtered.length === state.leads.length ? `${filtered.length}` : `${filtered.length} of ${state.leads.length}`;
  const list = $('list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${state.leads.length ? 'No matches.' : 'No inquiries yet. The form is live.'}</div>`;
    return;
  }
  list.innerHTML = filtered.map((l) => {
    const sel = state.selected && state.selected.id === l.id;
    const tier = TIER_SHORT[l.wealth] || '—';
    const country = COUNTRY_LBL[l.country] || l.country || '—';
    const ndaTag = ndaShortTag(l);
    return `
      <div class="lead-row ${sel?'sel':''}" data-id="${esc(l.id)}">
        <span class="lead-status s-${esc(l.status||'new')}" title="${STATUS_LBL[l.status]||l.status||'NEW'}"></span>
        <div class="lead-mid">
          <div class="lead-name">${esc(l.name||'Unnamed')}${l.name_ko?`<span class="ko">${esc(l.name_ko)}</span>`:''}</div>
          <div class="lead-meta">
            <span class="tier">${esc(tier)}</span>
            <span class="sep">·</span>
            <span class="country">${esc(country)}</span>
            ${l.code ? `<span class="sep">·</span><span style="color:var(--goldB);font-family:var(--mono)">${esc(l.code)}</span>` : ''}
            ${ndaTag}
          </div>
        </div>
        <div class="lead-time">${relTime(l.submitted_at_ms)}</div>
      </div>`;
  }).join('');
  list.querySelectorAll('.lead-row').forEach((r) => {
    r.addEventListener('click', () => {
      const lead = state.leads.find((x) => x.id === r.dataset.id);
      if (lead) selectLead(lead);
    });
  });
}
function ndaShortTag(l) {
  if (l.nda_state === 'uploaded') return '<span class="sep">·</span><span class="nda-tag rev" title="NDA awaiting partner review">NDA · REVIEW</span>';
  if (l.nda_state === 'approved') return '<span class="sep">·</span><span class="nda-tag ok" title="NDA approved">NDA ✓</span>';
  if (l.nda_state === 'rejected') return '<span class="sep">·</span><span class="nda-tag err" title="NDA rejected — patron must re-upload">NDA ✗</span>';
  return '';
}

function relTime(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  if (diff < 60_000) return 'now';
  if (diff < 3600_000) return Math.floor(diff/60_000) + 'm';
  if (diff < 86400_000) return Math.floor(diff/3600_000) + 'h';
  if (diff < 7*86400_000) return Math.floor(diff/86400_000) + 'd';
  const d = new Date(ms);
  return d.toLocaleDateString('en-CA');
}
function selectLead(l) {
  state.selected = l;
  renderList();
  renderDetail();
  // mobile: switch to detail pane
  if (window.matchMedia('(max-width:960px)').matches) {
    $('pane-list').classList.add('show-list-was-list');
    $('pane-detail').scrollIntoView({behavior:'smooth',block:'start'});
  }
  // update URL
  try { const u = new URL(location.href); u.searchParams.set('lead', l.id); history.replaceState({}, '', u); } catch {}
}

// ── detail ───────────────────────────────────────────────────────────────
function interestsList(l) {
  if (l.interest_all) return ['All of the above'];
  const a = [];
  if (l.interest_deals) a.push('Global private deals');
  if (l.interest_gold) a.push('Gold investment');
  if (l.interest_familyoffice) a.push('Family office');
  return a;
}
function fmtDate(ms) { if (!ms) return '—'; return new Date(ms).toLocaleString('en-CA',{dateStyle:'medium',timeStyle:'short'}); }

function renderDetail() {
  const l = state.selected;
  if (!l) {
    $('detail-empty').style.display = 'flex';
    $('detail').style.display = 'none';
    return;
  }
  $('detail-empty').style.display = 'none';
  const d = $('detail');
  d.style.display = 'block';

  const interests = interestsList(l);
  const phone = (l.phone_cc||'') + ' ' + (l.phone||'');
  const facts = [
    ['EMAIL', l.email ? `<a href="mailto:${esc(l.email)}">${esc(l.email)}</a>` : '—'],
    ['PHONE', phone.trim() ? esc(phone.trim()) : '—'],
    ['COUNTRY', esc(COUNTRY_LBL[l.country] || l.country || '—')],
    ['INVESTABLE ASSETS', `<em>${esc(TIER_LBL[l.wealth] || l.wealth || '—')}</em>`],
    ['INTERESTS', interests.length ? interests.map(esc).join(' · ') : '—'],
    ['INTRODUCED BY', l.referral ? esc(l.referral) : '—'],
    ['SUBMITTED', esc(fmtDate(l.submitted_at_ms))],
    ['INVITATION CODE', l.code
      ? (l.code_revoked
          ? `<span style="color:var(--red);font-family:var(--mono);text-decoration:line-through">${esc(l.code)}</span> <span style="color:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:.24em">REVOKED</span>`
          : `<span style="font-family:var(--mono);color:var(--goldB);letter-spacing:.16em">${esc(l.code)}</span>`)
      : '<span style="color:var(--muted);font-style:italic">not yet issued</span>'],
  ];

  const statuses = ['new','reviewing','approved','declined'];

  d.innerHTML = `
    <button class="back-mob" id="back-mob">← BACK TO LIST</button>
    <div class="det-eyebrow">
      ${esc(STATUS_LBL[l.status] || 'NEW')}
      <span class="id">${esc(l.id)}</span>
    </div>
    <h1 class="det-name">${esc(l.name||'Unnamed')}${l.name_ko?`<span class="ko">${esc(l.name_ko)}</span>`:''}</h1>
    <p class="det-sub">Inquiry received <em>${esc(relTime(l.submitted_at_ms))}</em> ago.</p>

    <div class="status-bar">
      ${statuses.map((s) => `
        <button class="status-pill ${s} ${l.status===s||(s==='approved'&&l.status==='sent')?'on':''}" data-status="${s}">
          <span class="dot"></span>${STATUS_LBL[s]}
        </button>
      `).join('')}
    </div>

    <div class="facts">
      ${facts.map(([lbl,val]) => `
        <div class="fact"><div class="fact-lbl">${lbl}</div><div class="fact-val">${val}</div></div>
      `).join('')}
    </div>

    ${l.note ? `<div class="note-block"><span class="lbl">NOTE FROM PATRON</span>${esc(l.note)}</div>` : ''}

    <div class="section">
      <h2 class="sec-h">INVITATION · 초대</h2>
      <div class="approve-panel">
        <div class="approve-row">
          <div class="code-box ${l.code && !l.code_revoked ? '' : 'empty'}">
            ${l.code && !l.code_revoked ? esc(l.code) : (l.code_revoked ? 'CODE REVOKED — issue a new one' : 'no code yet')}
          </div>
          ${l.code && !l.code_revoked
            ? `<button class="btn-big outline" data-action="resend">RESEND EMAIL →</button>
               <button class="btn-big outline" data-action="copy-link">COPY LINK</button>
               <button class="btn-big outline" data-action="preview">PREVIEW EMAIL</button>
               <button class="btn-danger" data-action="revoke">REVOKE</button>`
            : `<button class="btn-big" data-action="approve">APPROVE & SEND →</button>
               <button class="btn-big outline" data-action="approve-no-email">GENERATE CODE ONLY</button>`}
        </div>
        <div class="approve-meta">
          ${l.code_issued_at ? `<span>Issued ${esc(fmtDate(l.code_issued_at))}</span>` : ''}
          ${l.email_sent_at ? `<span class="ok">✓ Sent ${esc(fmtDate(l.email_sent_at))}</span>` : ''}
          ${l.last_opened_at ? `<span class="ok">◉ Opened ${esc(fmtDate(l.last_opened_at))}${l.opens?` · ${l.opens}×`:''}</span>` : (l.code && !l.code_revoked ? '<span class="warn">Not yet opened</span>' : '')}
          ${l.downloads ? `<span class="ok">↓ ${l.downloads} download${l.downloads>1?'s':''}</span>` : ''}
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="sec-h">NDA · 비밀유지 계약</h2>
      ${renderNdaPanel(l)}
    </div>

    <div class="section">
      <h2 class="sec-h">PARTNER NOTES · 메모</h2>
      ${l.notes && l.notes.length ? `
        <div class="notes-list">
          ${l.notes.slice().reverse().map((n) => `
            <div class="note-item">
              ${esc(n.text)}
              <div class="note-foot">${esc(n.actor||'partner')} · ${esc(fmtDate(n.at))}</div>
            </div>
          `).join('')}
        </div>
      ` : `<div class="notes-empty">No notes yet.</div>`}
      <div class="note-form">
        <textarea id="note-input" placeholder="Add a follow-up note — call summary, decision rationale, next step…"></textarea>
        <div class="row">
          <button class="btn-gold" id="note-save">+ ADD NOTE</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="sec-h">AUDIT TRAIL · 감사</h2>
      <div class="audit-list">
        ${(l.audit||[]).slice().reverse().map((a) => `
          <div class="audit-item">
            <span class="when">${esc(fmtDate(a.at))}</span>
            <span class="what">${describeAudit(a)}</span>
            <span class="who">${esc(a.actor||'')}</span>
          </div>
        `).join('') || '<div class="notes-empty">No history.</div>'}
      </div>
    </div>
  `;

  // wire status pills
  d.querySelectorAll('.status-pill').forEach((b) => {
    b.addEventListener('click', () => updateStatus(b.dataset.status));
  });
  // wire actions
  d.querySelectorAll('[data-action]').forEach((b) => {
    b.addEventListener('click', () => doAction(b.dataset.action, b));
  });
  // note form
  $('note-save').addEventListener('click', addNote);
  // back on mobile
  const back = $('back-mob');
  if (back) back.addEventListener('click', () => {
    state.selected = null;
    try { const u = new URL(location.href); u.searchParams.delete('lead'); history.replaceState({}, '', u); } catch {}
    renderList();
    renderDetail();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

function describeAudit(a) {
  switch (a.action) {
    case 'submitted':   return 'Inquiry submitted';
    case 'status':      return `Status: <em>${esc(a.from||'?')}</em> → <strong>${esc(a.to||'?')}</strong>`;
    case 'note':        return 'Note added';
    case 'approve':     return `Approved · code <span style="font-family:var(--mono);color:var(--goldB)">${esc(a.code||'')}</span>`;
    case 'email_sent':  return `Email sent to <em>${esc(a.to||'')}</em>`;
    case 'email_failed':return `<span style="color:var(--red)">Email failed</span> · ${esc(a.reason||'')}`;
    case 'revoke_code': return `Code revoked <span style="font-family:var(--mono);text-decoration:line-through">${esc(a.code||'')}</span>`;
    case 'opened':      return 'Materials opened by patron';
    case 'download':    return `Patron downloaded · <em>${esc(a.doc||'')}</em>`;
    case 'nda_uploaded':return `NDA uploaded · <em>${esc(a.filename||'?')}</em> (${fmtBytes(a.size||0)})${a.archive_count > 1 ? ` <span style="color:var(--muted)">· version ${a.archive_count}</span>` : ''}`;
    case 'nda_approved':return `<span style="color:var(--green)">NDA approved</span> — patron has access`;
    case 'nda_rejected':return `<span style="color:var(--red)">NDA rejected</span> · ${esc(a.reason||'')}`;
    case 'nda_template_downloaded': return 'Patron downloaded NDA template';
    case 'nda_viewed':  return 'Partner opened uploaded NDA';
    default:            return esc(a.action || '?');
  }
}

function fmtBytes(n) {
  if (!n) return '0 B';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/(1024*1024)).toFixed(2) + ' MB';
}

function renderNdaPanel(l) {
  const state = l.nda_state || (l.code && !l.code_revoked ? 'awaiting' : 'inactive');
  const archive = Array.isArray(l.nda_archive) ? l.nda_archive : [];
  const archiveBlock = archive.length ? renderNdaArchive(l, archive) : '';

  if (state === 'inactive') {
    return `<div class="nda-panel nda-inactive">Issue an invitation code first — the NDA gate activates when the patron is approved.</div>${archiveBlock}`;
  }
  if (state === 'awaiting') {
    return `<div class="nda-panel nda-awaiting">
      <div class="nda-row">
        <span class="nda-pip"></span>
        <div class="nda-body">
          <div class="nda-head">AWAITING UPLOAD</div>
          <div class="nda-msg">The patron has not yet uploaded a signed NDA.</div>
        </div>
      </div>
    </div>${archiveBlock}`;
  }
  // uploaded / approved / rejected — file is present
  const fileName = esc(l.nda_file_name || 'signed.pdf');
  const fileSize = fmtBytes(l.nda_file_size || 0);
  const upAt = l.nda_uploaded_at ? esc(fmtDate(l.nda_uploaded_at)) : '—';
  const revAt = l.nda_reviewed_at ? esc(fmtDate(l.nda_reviewed_at)) : '';
  const revBy = l.nda_reviewed_by ? esc(String(l.nda_reviewed_by).toUpperCase()) : '';
  const actions = state === 'uploaded'
    ? `<button class="btn-big" data-action="nda-approve">APPROVE NDA →</button>
       <button class="btn-big outline" data-action="nda-view">VIEW FILE</button>
       <button class="btn-big-danger" data-action="nda-reject">REJECT</button>`
    : state === 'approved'
      ? `<button class="btn-big outline" data-action="nda-view">VIEW FILE</button>
         <button class="btn-big-danger" data-action="nda-reject">REVOKE & REJECT</button>`
      : /* rejected */
        `<button class="btn-big outline" data-action="nda-view">VIEW LAST UPLOAD</button>
         <span class="nda-meta-pill warn">Awaiting patron re-upload</span>`;

  const reasonBlock = state === 'rejected' && l.nda_rejection_reason
    ? `<div class="nda-reason">Rejection reason: <em>${esc(l.nda_rejection_reason)}</em></div>`
    : '';

  return `<div class="nda-panel nda-${state}">
    <div class="nda-row">
      <span class="nda-pip"></span>
      <div class="nda-body">
        <div class="nda-head">${state === 'uploaded' ? 'AWAITING REVIEW' : (state === 'approved' ? 'APPROVED' : 'REJECTED — RE-UPLOAD PENDING')}</div>
        <div class="nda-msg"><span style="font-family:var(--mono);font-size:11px;color:var(--text)">${fileName}</span> <span style="color:var(--muted);font-family:var(--mono);font-size:10px">· ${fileSize}</span></div>
        <div class="nda-meta">
          <span>Uploaded ${upAt}</span>
          ${revAt ? `<span class="${state==='approved'?'ok':'err'}">${state==='approved' ? '✓ Approved' : '✗ Rejected'} ${revAt} · ${revBy}</span>` : ''}
        </div>
        ${reasonBlock}
      </div>
    </div>
    <div class="nda-actions">${actions}</div>
  </div>${archiveBlock}`;
}

function renderNdaArchive(l, archive) {
  // Show oldest → newest. Each entry is an immutable record of a prior upload.
  const items = archive.map((a, idx) => {
    const stateLabel = a.final_state === 'approved' ? 'APPROVED' : (a.final_state === 'rejected' ? 'REJECTED' : (a.final_state || 'SUPERSEDED').toUpperCase());
    const stateClass = a.final_state === 'approved' ? 'ok' : (a.final_state === 'rejected' ? 'err' : '');
    const reviewedBy = a.reviewed_by ? esc(String(a.reviewed_by).toUpperCase()) : '';
    const reasonBit = a.rejection_reason ? ` · <em style="color:var(--red)">${esc(a.rejection_reason)}</em>` : '';
    return `
      <div class="nda-arch-row">
        <div class="nda-arch-meta">
          <span class="nda-arch-num">v${idx + 1}</span>
          <span class="nda-arch-name">${esc(a.file_name || '—')}</span>
          <span class="nda-arch-size">${fmtBytes(a.file_size || 0)}</span>
        </div>
        <div class="nda-arch-when">
          ${esc(fmtDate(a.uploaded_at))} →
          <span class="${stateClass}">${stateLabel}${reviewedBy ? ' · ' + reviewedBy : ''}</span>${reasonBit}
        </div>
        <button class="btn-tiny" data-action="nda-view-archive" data-archive="${idx}">VIEW</button>
      </div>`;
  }).join('');

  return `
    <div class="nda-archive-block">
      <div class="nda-archive-head">
        <span class="lbl">ARCHIVE · ${archive.length} prior upload${archive.length > 1 ? 's' : ''}</span>
        <span class="hint">Retained for legal record. Files are never deleted.</span>
      </div>
      <div class="nda-archive-list">${items}</div>
    </div>`;
}

// ── actions ──────────────────────────────────────────────────────────────
async function updateStatus(status) {
  if (!state.selected) return;
  const old = state.selected.status;
  if (old === status) return;
  try {
    const j = await api('POST', '/api/admin/update', { id: state.selected.id, status });
    state.selected = j.lead;
    upsertLead(j.lead);
    renderStats(); renderFilters(); renderList(); renderDetail();
    toast('STATUS · ' + STATUS_LBL[status], 'ok');
  } catch (e) { toast('UPDATE FAILED · ' + e.message, 'err'); }
}

async function addNote() {
  const ta = $('note-input');
  const text = (ta.value || '').trim();
  if (!text) return;
  const btn = $('note-save');
  btn.disabled = true; btn.textContent = '…';
  try {
    const j = await api('POST', '/api/admin/update', { id: state.selected.id, note: text });
    state.selected = j.lead;
    upsertLead(j.lead);
    renderDetail();
    toast('NOTE ADDED', 'ok');
  } catch (e) {
    toast('FAILED · ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '+ ADD NOTE';
  }
}

async function doAction(action, btn) {
  const l = state.selected;
  if (!l) return;
  if (action === 'approve' || action === 'approve-no-email' || action === 'resend') {
    const sendEmail = action !== 'approve-no-email';
    const verb = action === 'resend' ? 'Resend the invitation email?' : (sendEmail ? 'Approve and email the invitation now?' : 'Generate a code without emailing?');
    if (!confirm(verb)) return;
    try {
      const j = await api('POST', '/api/admin/approve', { id: l.id, send_email: sendEmail });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderStats(); renderFilters(); renderList(); renderDetail();
      if (j.email && j.email.sent) toast('SENT · ' + j.code, 'ok');
      else if (sendEmail) toast('CODE READY · email not sent (' + (j.email?.reason||'?') + ')', 'err');
      else toast('CODE · ' + j.code, 'ok');
      // Show preview
      window._lastPreview = j.preview;
      window._lastCode = j.code;
      window._lastUrl = j.accessUrl;
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'copy-link') {
    const url = `${location.origin}/code?c=${encodeURIComponent(l.code)}`;
    try { await navigator.clipboard.writeText(url); toast('LINK COPIED', 'ok'); }
    catch { prompt('Copy this link:', url); }
  }
  else if (action === 'preview') {
    const url = `${location.origin}/code?c=${encodeURIComponent(l.code)}`;
    const text = `To: ${l.email}\nCode: ${l.code}\nLink: ${url}\n\n— A bilingual invitation email is sent automatically when you click APPROVE & SEND. Use COPY LINK to share the code manually.`;
    showModal('INVITATION · ' + l.code, text);
  }
  else if (action === 'revoke') {
    if (!confirm('Revoke this code? The patron will lose access to the materials immediately.')) return;
    try {
      const j = await api('POST', '/api/admin/update', { id: l.id, action: 'revoke_code' });
      state.selected = j.lead;
      upsertLead(j.lead);
      renderDetail();
      toast('CODE REVOKED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'nda-view') {
    // Open the uploaded NDA in a new tab (server streams with admin auth)
    window.open(`/api/admin/nda-download?id=${encodeURIComponent(l.id)}`, '_blank', 'noopener');
  }
  else if (action === 'nda-view-archive') {
    const idx = btn ? btn.dataset.archive : null;
    if (idx === null || idx === undefined) return;
    window.open(`/api/admin/nda-download?id=${encodeURIComponent(l.id)}&archive=${encodeURIComponent(idx)}`, '_blank', 'noopener');
  }
  else if (action === 'nda-approve') {
    if (!confirm('Approve this NDA? The patron will get access to the materials immediately.')) return;
    try {
      const j = await api('POST', '/api/admin/nda-review', { id: l.id, decision: 'approve' });
      // Reload the lead since approve.js doesn't return the full lead
      await refreshSelectedLead();
      toast('NDA APPROVED', 'ok');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
  else if (action === 'nda-reject') {
    const reason = prompt('Reason for rejection (visible to patron):');
    if (!reason || !reason.trim()) return;
    try {
      const j = await api('POST', '/api/admin/nda-review', { id: l.id, decision: 'reject', reason: reason.trim() });
      await refreshSelectedLead();
      toast('NDA REJECTED · patron will be notified', 'err');
    } catch (e) { toast('FAILED · ' + e.message, 'err'); }
  }
}

async function refreshSelectedLead() {
  if (!state.selected) return;
  const id = state.selected.id;
  try {
    const j = await api('GET', '/api/admin/list');
    state.leads = j.leads || [];
    state.stats = j.stats || null;
    const found = state.leads.find((x) => x.id === id);
    if (found) state.selected = found;
    renderStats(); renderFilters(); renderList(); renderDetail();
  } catch {}
}

function upsertLead(l) {
  const i = state.leads.findIndex((x) => x.id === l.id);
  if (i >= 0) state.leads[i] = l;
  else state.leads.unshift(l);
  // recompute stats locally for snappy feel; full stats refreshed on next load
  if (state.stats) {
    const s = { total:0, new:0, reviewing:0, approved:0, sent:0, declined:0, by_tier:{}, last_24h:0, last_7d:0 };
    const now = Date.now();
    for (const x of state.leads) {
      s.total++;
      s[x.status] = (s[x.status]||0) + 1;
      if (x.wealth) s.by_tier[x.wealth] = (s.by_tier[x.wealth]||0) + 1;
      const age = now - (x.submitted_at_ms||0);
      if (age < 24*3600*1000) s.last_24h++;
      if (age < 7*24*3600*1000) s.last_7d++;
    }
    state.stats = s;
  }
}

// ── modal ────────────────────────────────────────────────────────────────
function showModal(h, body) { $('modal-h').textContent = h; $('modal-body').textContent = body; $('modal').classList.add('show'); }
$('modal-close').addEventListener('click', () => $('modal').classList.remove('show'));
$('modal').addEventListener('click', (e) => { if (e.target === $('modal')) $('modal').classList.remove('show'); });
$('modal-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText($('modal-body').textContent); toast('COPIED', 'ok'); } catch {}
});

// ── poll ─────────────────────────────────────────────────────────────────
setInterval(() => { if ($('app').classList.contains('show')) load(); }, 60_000);

// ── init ─────────────────────────────────────────────────────────────────
checkSession();

// keyboard: r to refresh, esc to deselect
document.addEventListener('keydown', (e) => {
  if (!$('app').classList.contains('show')) return;
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'r' || e.key === 'R') { load(); toast('REFRESHED','ok'); }
  if (e.key === 'Escape' && state.selected) {
    state.selected = null;
    try { const u = new URL(location.href); u.searchParams.delete('lead'); history.replaceState({}, '', u); } catch {}
    renderList(); renderDetail();
  }
});
</script>
</body>
</html>
